<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-brand-background min-h-screen flex flex-col font-sans selection:bg-brand-blue selection:text-white">

    <nav class="p-4 md:p-6">
        <div class="max-w-[1536px] mx-auto">
            <a href="/" class="inline-block">
                <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="h-6 md:h-8 w-auto object-contain">
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 pb-8">
        <div class="w-full max-w-[420px]">
            <div class="bg-white rounded-[24px] md:rounded-[32px] border border-brand-border shadow-xl shadow-blue-900/5 p-6 md:p-10">
                
                <div class="text-center mb-6">
                    <h1 class="text-xl md:text-2xl font-extrabold text-brand-darkText mb-1.5">Create account</h1>
                    <p class="text-brand-lightText text-xs md:text-sm">Join SMSGlobe for global connectivity.</p>
                </div>

                <div id="g_id_onload"
                     data-client_id="200301370065-fl80h2idsgants6kb6jcuaivkonljs6u.apps.googleusercontent.com"
                     data-callback="handleGoogleSignup"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin mb-5 flex justify-center" 
                     data-type="standard" 
                     data-size="large" 
                     data-theme="outline" 
                     data-text="signup_with" 
                     data-shape="rectangular" 
                     data-logo_alignment="left" 
                     data-width="320">
                </div>

                <div class="relative flex items-center mb-5">
                    <div class="flex-grow border-t border-brand-border"></div>
                    <span class="flex-shrink mx-3 text-[10px] font-bold text-brand-lightText uppercase tracking-tighter">Or use email</span>
                    <div class="flex-grow border-t border-brand-border"></div>
                </div>

                <form id="registerForm" class="space-y-3.5">
                    <div>
                        <label for="name" class="block text-xs font-semibold text-brand-midText mb-1">Full Name</label>
                        <input type="text" id="name" name="name" required 
                            class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400" 
                            placeholder="John Doe">
                    </div>

                    <div>
                        <label for="email" class="block text-xs font-semibold text-brand-midText mb-1">Email Address</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400" 
                            placeholder="name@company.com">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                        <div>
                            <label for="password" class="block text-xs font-semibold text-brand-midText mb-1">Password</label>
                            <input type="password" id="password" name="password" required 
                                class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400" 
                                placeholder="••••••••">
                        </div>
                        <div>
                            <label for="confirm_password" class="block text-xs font-semibold text-brand-midText mb-1">Confirm</label>
                            <input type="password" id="confirm_password" name="confirm_password" required 
                                class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400" 
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex justify-center py-1 scale-[0.85] md:scale-100">
                        <div class="g-recaptcha" data-sitekey="6Lchfa0sAAAAAMmRum4xNJHD-6RY7udDf6WSTSeW"></div>
                    </div>

                    <p class="text-[10px] text-brand-lightText text-center leading-tight">
                        By signing up, you agree to our <a href="#" class="text-brand-blue font-bold">Terms</a> and <a href="#" class="text-brand-blue font-bold">Privacy</a>.
                    </p>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-3 md:py-4 rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 disabled:opacity-50">
                        Create Account
                    </button>
                </form>

                <p class="text-center mt-6 text-xs text-brand-midText">
                    Already have an account? 
                    <a href="user_login.html" class="text-brand-blue font-bold hover:underline">Log in</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        // --- Google Signup Handler ---
        async function handleGoogleSignup(response) {
            try {
                const res = await fetch('/api/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: response.credential, loginType: 'user' })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userToken', data.token);
                    window.location.href = '/smsuser/dashboard';
                } else {
                    alert(data.message || "Google Signup Failed");
                }
            } catch (err) {
                alert("Connection error during Google signup.");
            }
        }

        // --- Standard Email Registration ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const fullName = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const captchaToken = grecaptcha.getResponse();

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            if (!captchaToken) {
                alert("Please verify that you are not a robot.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Creating...";

            try {
                const response = await fetch('/api/user-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, captchaToken })
                });

                const data = await response.json();
                if (data.success) {
                    alert("Account created! Redirecting to login...");
                    window.location.href = 'user_login.html';
                } else {
                    alert(data.message || "Registration failed.");
                    grecaptcha.reset();
                }
            } catch (err) {
                alert("A connection error occurred.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Account";
            }
        });
    </script>
</body>
</html>
