<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; }
        .logo-img { height: 36px; width: auto; object-fit: contain; }
        @media (min-width: 768px) { .logo-img { height: 44px; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans">

    <div class="w-full max-w-[400px]">
        <div class="flex flex-col items-center mb-6 sm:mb-8">
            <a href="/">
                <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="logo-img mb-3 sm:mb-4">
            </a>
            <h1 class="text-xl sm:text-2xl font-bold text-brand-darkText">Admin Login</h1>
            <p class="text-[13px] sm:text-sm text-brand-lightText mt-1 sm:mt-2 text-center">Welcome back! Please enter your details.</p>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-[20px] sm:rounded-[24px] border border-brand-border shadow-xl shadow-blue-100/50">
            <form id="loginForm" class="space-y-4 sm:space-y-5">
                <div>
                    <label class="block text-[12px] sm:text-sm font-semibold text-brand-darkText mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" 
                        class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-[13px] sm:text-sm" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-[12px] sm:text-sm font-semibold text-brand-darkText">Password</label>
                        <a href="#" class="text-[11px] sm:text-xs font-bold text-brand-blue hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••" 
                            class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-[13px] sm:text-sm" required>
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-lightText hover:text-brand-blue">
                            <svg id="eye-icon" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-3 sm:py-3.5 rounded-xl text-[14px] sm:text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 mt-2 flex justify-center items-center gap-2">
                    <span>Sign in</span>
                </button>

                <div class="relative py-3 sm:py-4 flex items-center">
                    <div class="flex-grow border-t border-brand-border"></div>
                    <span class="flex-shrink mx-4 text-[10px] sm:text-xs font-medium text-brand-lightText uppercase tracking-widest">Or</span>
                    <div class="flex-grow border-t border-brand-border"></div>
                </div>

                <button type="button" class="w-full bg-white border border-brand-border py-2.5 sm:py-3 rounded-xl text-[13px] sm:text-sm font-semibold text-brand-darkText flex items-center justify-center gap-2 sm:gap-3 hover:bg-gray-50 transition-all">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4 sm:w-5 sm:h-5" alt="Google">
                    Continue with Google
                </button>
            </form>

            <div class="mt-6 sm:mt-8 text-center">
                <p class="text-[12px] sm:text-sm text-brand-lightText">
                    Don't have an account? 
                    <a href="smsadmin_create.html" class="text-brand-blue font-bold hover:underline ml-1">Create account</a>
                </p>
            </div>
        </div>

        <p class="mt-6 sm:mt-8 text-center text-[10px] sm:text-xs text-brand-lightText">
            © 2026 SMSGlobe. Secure Admin Access.
        </p>
    </div>

    <script>
        // --- 1. UI TOGGLE PASSWORD ---
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOpen = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            const eyeClosed = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L4.573 4.574m14.853 14.853L14.12 14.12M21.543 12A9.981 9.981 0 0012 5c-1.838 0-3.535.494-4.99 1.357" />';
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = eyeClosed;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = eyeOpen;
            }
        }

        // --- 2. LOGIN API LOGIC ---
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button to prevent double-clicks
            submitBtn.disabled = true;
            submitBtn.innerText = "Authenticating...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Call your api.js action
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // STORE JWT TOKEN: Essential for million-user scale
                    localStorage.setItem('smsglobe_admin_token', data.token);
                    
                    // Redirect to your Dashboard (Change name as needed)
                    window.location.href = 'smsadmin_dashboard.html';
                } else {
                    alert(data.message || 'Invalid email or password.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Sign in";
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('Server connection error. Please try again later.');
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign in";
            }
        });
    </script>
</body>
</html>
