<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Number | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
    @layer utilities {
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        .step-hidden { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.5s ease-in-out; pointer-events: none; }
        .step-visible { opacity: 1; max-height: 2000px; overflow: visible; transition: all 0.5s ease-in-out; pointer-events: auto; }
        
        .service-card.active, .number-card.active { 
            border-color: #0F54C6 !important; 
            background-color: #F0F5FE !important; 
            border-width: 2px !important;
            box-shadow: 0 4px 6px -1px rgb(15 84 198 / 0.1);
        }
    }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText overflow-y-auto">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button id="closeSidebar" class="lg:hidden text-gray-400 text-xl">&times;</button>
        </div>
        
        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 bg-brand-background text-brand-blue rounded-lg text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span>Buy Number</span>
            </a>
        </nav>

        <div class="p-4 border-t border-brand-border">
            <button class="flex items-center space-x-3 w-full px-3 py-2 text-red-500 hover:bg-red-50 rounded-lg text-xs font-bold transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span>Log Out</span>
            </button>
        </div>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen relative">
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 md:px-8 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <button id="openSidebar" class="lg:hidden p-1.5 text-brand-midText border border-brand-border rounded-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="text-sm font-bold text-brand-darkText">Rent a Number</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-xs font-bold border border-brand-blue/20">U</div>
        </header>

        <main class="p-4 md:p-6 max-w-5xl w-full mx-auto flex-grow pb-40">
            <div class="flex p-1 bg-white border border-brand-border rounded-2xl w-full md:w-fit mb-6">
                <button onclick="switchTab('activation')" id="tabActivation" class="flex-1 md:flex-none px-8 py-2.5 rounded-xl text-xs font-bold transition-all bg-brand-blue text-white shadow-sm">Activation</button>
                <button onclick="switchTab('rent')" id="tabRent" class="flex-1 md:flex-none px-8 py-2.5 rounded-xl text-xs font-bold transition-all text-brand-lightText">Rent</button>
            </div>

            <div id="sectionActivation" class="space-y-8">
                <section class="space-y-4">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h4 class="text-xs font-bold text-brand-darkText uppercase">Step 1: Select Service</h4>
                        <input type="text" id="serviceSearch" onkeyup="filterServices()" placeholder="Search services..." class="px-4 py-2 bg-white border border-brand-border rounded-xl text-xs outline-none w-full md:w-64">
                    </div>
                    <div id="serviceGrid" class="grid grid-cols-6 gap-2"></div>
                </section>

                <section id="countrySection" class="step-hidden space-y-3 pt-6 border-t border-brand-border">
                    <h4 class="text-[10px] font-bold text-brand-darkText uppercase">Step 2: Select Country</h4>
                    <div class="relative w-full md:w-80">
                        <button onclick="toggleCountryDropdown()" class="w-full bg-white border border-brand-border rounded-xl px-4 py-3 flex items-center justify-between">
                            <div id="selectedCountryDisplay" class="flex items-center gap-3 text-xs text-gray-400">Select a country...</div>
                            <svg class="w-4 h-4 text-brand-lightText" id="dropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2"/></svg>
                        </button>
                        <div id="countryDropdownList" class="absolute left-0 right-0 mt-2 bg-white border border-brand-border rounded-xl shadow-xl z-50 hidden">
                            <div id="countryOptions" class="max-h-60 overflow-y-auto no-scrollbar"></div>
                        </div>
                    </div>
                </section>

                <section id="numbersSection" class="step-hidden space-y-4 pt-6 border-t border-brand-border">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h4 class="text-xs font-bold text-brand-darkText uppercase">Step 3: Select Number</h4>
                        <div class="relative w-full md:w-64">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-brand-blue" id="prefixDisplay">+0</span>
                            <input type="number" id="areaCodeSearch" onkeyup="filterNumbers()" placeholder="Search Area Code..." class="pl-10 pr-4 py-2 bg-white border border-brand-border rounded-xl text-xs outline-none w-full">
                        </div>
                    </div>
                    <div id="numberGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
                </section>
            </div>

            <div id="sectionRent" class="hidden py-20 text-center">
                <p class="text-xs font-bold">Long term rental coming soon.</p>
            </div>
        </main>

        <div class="fixed bottom-0 left-0 right-0 lg:left-64 bg-brand-blue text-white p-4 md:p-6 z-40 border-t border-white/10 shadow-lg">
            <div class="max-w-5xl mx-auto flex items-center justify-between">
                <div>
                    <p class="text-[8px] font-bold uppercase opacity-70">Total Due</p>
                    <h2 class="text-xl md:text-2xl font-black" id="displayPrice">₦0</h2>
                </div>
                <button onclick="processRent()" class="px-8 py-3 bg-white text-brand-blue rounded-xl font-bold text-xs disabled:opacity-50" id="rentBtn" disabled>Rent Now</button>
            </div>
        </div>
    </div>

    <script>
        const countries = [
            { id: 'US', name: 'USA', flag: 'https://flagcdn.com/w40/us.png', rate: 1500, prefix: '+1', available: '1,240' },
            { id: 'UK', name: 'UK', flag: 'https://flagcdn.com/w40/gb.png', rate: 1200, prefix: '+44', available: '850' },
            { id: 'NG', name: 'Nigeria', flag: 'https://flagcdn.com/w40/ng.png', rate: 850, prefix: '+234', available: '3,100' },
            { id: 'RU', name: 'Russia', flag: 'https://flagcdn.com/w40/ru.png', rate: 700, prefix: '+7', available: '5,000+' },
            { id: 'UA', name: 'Ukraine', flag: 'https://flagcdn.com/w40/ua.png', rate: 750, prefix: '+380', available: '920' },
            { id: 'DE', name: 'Germany', flag: 'https://flagcdn.com/w40/de.png', rate: 2100, prefix: '+49', available: '410' },
            { id: 'FR', name: 'France', flag: 'https://flagcdn.com/w40/fr.png', rate: 1900, prefix: '+33', available: '600' }
        ];

        const services = [
            { id: 'wa', name: 'WhatsApp', icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png' },
            { id: 'tg', name: 'Telegram', icon: 'https://cdn-icons-png.flaticon.com/512/2111/2111646.png' },
            { id: 'go', name: 'Google', icon: 'https://cdn-icons-png.flaticon.com/512/300/300221.png' },
            { id: 'fb', name: 'Facebook', icon: 'https://cdn-icons-png.flaticon.com/512/733/733547.png' },
            { id: 'ig', name: 'Instagram', icon: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'tk', name: 'TikTok', icon: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png' },
            { id: 'tw', name: 'Twitter', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968958.png' },
            { id: 'dc', name: 'Discord', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968756.png' }
        ];

        let selectedCountry = null;
        let selectedService = null;
        let selectedNumber = null;
        let currentNumbersList = [];

        function renderServiceGrid() {
            const grid = document.getElementById('serviceGrid');
            grid.innerHTML = services.map(s => `
                <div onclick="selectService('${s.id}', this)" class="service-card cursor-pointer bg-white border border-brand-border p-2 rounded-xl flex flex-col items-center justify-center transition-all">
                    <img src="${s.icon}" class="w-5 h-5 mb-1.5 object-contain">
                    <span class="text-[8px] font-bold text-brand-darkText truncate w-full text-center">${s.name}</span>
                </div>
            `).join('');
        }

        function selectService(id, element) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedService = id;
            document.getElementById('countrySection').classList.replace('step-hidden', 'step-visible');
            renderCountryOptions();
        }

        function renderCountryOptions() {
            const container = document.getElementById('countryOptions');
            container.innerHTML = countries.map(c => `
                <div onclick="selectCountry('${c.id}')" class="flex items-center justify-between px-4 py-3 hover:bg-brand-background cursor-pointer border-b border-gray-50 last:border-0">
                    <div class="flex items-center gap-3">
                        <img src="${c.flag}" class="w-5 h-auto rounded-sm border border-gray-100">
                        <div class="flex flex-col">
                             <span class="text-xs font-bold text-brand-darkText">${c.name}</span>
                             <span class="text-[8px] text-green-600 font-bold uppercase">${c.available} Available</span>
                        </div>
                    </div>
                    <span class="text-[10px] font-extrabold text-brand-blue">₦${c.rate.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function toggleCountryDropdown() {
            document.getElementById('countryDropdownList').classList.toggle('hidden');
            document.getElementById('dropdownArrow').classList.toggle('rotate-180');
        }

        function selectCountry(id) {
            const country = countries.find(c => c.id === id);
            selectedCountry = country;
            document.getElementById('selectedCountryDisplay').innerHTML = `
                <img src="${country.flag}" class="w-4 h-auto rounded-sm">
                <span class="font-bold text-brand-darkText">${country.name}</span>
            `;
            document.getElementById('prefixDisplay').innerText = country.prefix;
            toggleCountryDropdown();
            document.getElementById('numbersSection').classList.replace('step-hidden', 'step-visible');
            document.getElementById('displayPrice').innerText = `₦${country.rate.toLocaleString()}`;
            generateMockNumbers();
        }

        // Generates a larger pool of numbers to demonstrate filtering
        function generateMockNumbers() {
            currentNumbersList = Array.from({length: 12}, () => {
                const randomPart = Math.floor(1000000 + Math.random() * 9000000).toString();
                return `${selectedCountry.prefix} ${randomPart}`;
            });
            renderNumbers(currentNumbersList);
        }

        function renderNumbers(list) {
            const grid = document.getElementById('numberGrid');
            if (list.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-[10px] py-4 text-brand-lightText">No numbers matching that area code...</p>`;
                return;
            }
            grid.innerHTML = list.map(num => `
                <div onclick="selectNumber('${num}', this)" class="number-card cursor-pointer bg-white border border-brand-border p-3 rounded-lg flex items-center justify-between">
                    <span class="text-xs font-bold text-brand-darkText">${num}</span>
                    <div class="w-3 h-3 rounded-full border border-gray-300"></div>
                </div>
            `).join('');
        }

        function filterNumbers() {
            const val = document.getElementById('areaCodeSearch').value;
            const filtered = currentNumbersList.filter(n => n.includes(val));
            renderNumbers(filtered);
        }

        function selectNumber(num, element) {
            document.querySelectorAll('.number-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedNumber = num;
            document.getElementById('rentBtn').disabled = false;
        }

        function switchTab(tab) {
            const actSec = document.getElementById('sectionActivation');
            const rentSec = document.getElementById('sectionRent');
            const actBtn = document.getElementById('tabActivation');
            const rentBtn = document.getElementById('tabRent');
            
            if (tab === 'activation') {
                actSec.classList.remove('hidden');
                rentSec.classList.add('hidden');
                actBtn.classList.add('bg-brand-blue', 'text-white');
                rentBtn.classList.remove('bg-brand-blue', 'text-white');
            } else {
                actSec.classList.add('hidden');
                rentSec.classList.remove('hidden');
                rentBtn.classList.add('bg-brand-blue', 'text-white');
                actBtn.classList.remove('bg-brand-blue', 'text-white');
            }
        }

        function filterServices() {
            const val = document.getElementById('serviceSearch').value.toLowerCase();
            document.querySelectorAll('.service-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        document.getElementById('openSidebar').addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar').addEventListener('click', toggleSidebar);
        window.onload = renderServiceGrid;
    </script>
</body>
</html>
