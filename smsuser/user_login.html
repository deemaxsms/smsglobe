<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-brand-background min-h-screen flex flex-col font-sans selection:bg-brand-blue selection:text-white">

    <nav class="p-4 md:p-6">
        <div class="max-w-[1536px] mx-auto">
            <a href="/" class="inline-block">
                <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="h-6 md:h-8 w-auto object-contain">
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 pb-8">
        <div class="w-full max-w-[400px]">
            <div class="bg-white rounded-[24px] md:rounded-[32px] border border-brand-border shadow-xl shadow-blue-900/5 p-6 md:p-10">
                
                <div class="text-center mb-6">
                    <h1 class="text-xl md:text-2xl font-extrabold text-brand-darkText mb-1.5">Welcome back</h1>
                    <p class="text-brand-lightText text-xs md:text-sm">Please enter your details to sign in.</p>
                </div>

                <div id="g_id_onload"
                     data-client_id="200301370065-fl80h2idsgants6kb6jcuaivkonljs6u.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin mb-5 flex justify-center" 
                     data-type="standard" 
                     data-size="large" 
                     data-theme="outline" 
                     data-text="signin_with" 
                     data-shape="rectangular" 
                     data-logo_alignment="left" 
                     data-width="320">
                </div>

                <div class="relative flex items-center mb-5">
                    <div class="flex-grow border-t border-brand-border"></div>
                    <span class="flex-shrink mx-3 text-[10px] font-bold text-brand-lightText uppercase tracking-tighter">Or use email</span>
                    <div class="flex-grow border-t border-brand-border"></div>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="email" class="block text-xs font-semibold text-brand-midText mb-1">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400"
                            placeholder="name@company.com">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label for="password" class="block text-xs font-semibold text-brand-midText">Password</label>
                            <a href="forgort-password.html" class="text-[10px] font-bold text-brand-blue hover:underline uppercase tracking-wide">Forgot?</a>
                        </div>
                        <input type="password" id="password" name="password" required
                            class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 focus:border-brand-blue outline-none transition-all placeholder:text-gray-400"
                            placeholder="••••••••">
                    </div>

                    <div class="flex justify-center py-1 scale-[0.85] md:scale-100">
                        <div class="g-recaptcha" data-sitekey="6LduuIwsAAAAAKX8pDkcisQngBWJ02n8fN9bobKt"></div>
                    </div>

                    <button type="submit" id="loginBtn" class="w-full bg-brand-blue text-white py-3 md:py-4 rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 disabled:opacity-50">
                        Sign In
                    </button>
                </form>

                <p class="text-center mt-6 text-xs text-brand-midText">
                    Don't have an account? 
                    <a href="user_create.html" class="text-brand-blue font-bold hover:underline">Sign up free</a>
                </p>
            </div>
        </div>
    </main>

    <script>

window.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/system-status');
        const status = await res.json();
        
        if (status.maintenanceMode) {
            // 1. Select the main login container
            const loginForm = document.getElementById('loginForm');
            
            if (loginForm) {
                loginForm.innerHTML = `
                    <div class="text-center p-8 bg-orange-50 rounded-2xl border border-orange-200 shadow-sm animate-in fade-in zoom-in duration-300">
                        <div class="mb-4 inline-flex p-3 bg-orange-100 rounded-full">
                            <svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                        <h2 class="font-bold text-xl text-orange-800 mb-2">Maintenance Active</h2>
                        <p class="text-sm text-orange-700 leading-relaxed mb-6">
                            ${status.noticeBar || "We are currently performing scheduled updates to improve SMSGlobe. Please check back shortly."}
                        </p>
                        <button onclick="window.location.reload()" class="w-full bg-white border border-orange-200 text-orange-700 py-2.5 rounded-xl font-semibold hover:bg-orange-100 transition-colors active:scale-95">
                            Refresh Page
                        </button>
                    </div>
                `;
            }

            // 2. Strictly hide social login and separators
            const googleBtn = document.getElementById('g_id_signin');
            const divider = document.querySelector('.relative.my-6'); // Adjust this selector to match your "OR USE EMAIL" divider
            const signupLink = document.querySelector('p.text-center.mt-8'); // Adjust to your "Don't have an account?" text

            if (googleBtn) googleBtn.style.display = 'none';
            if (divider) divider.style.display = 'none';
            if (signupLink) signupLink.style.display = 'none';
            
            // 3. Update the page title so the user sees it in the browser tab
            document.title = "Maintenance | SMSGlobe";
        }
    } catch (err) {
        console.error("Critical: Could not verify system status.", err);
    }
});
        // --- Google Login Handler ---
        async function handleCredentialResponse(response) {
            try {
                const res = await fetch('/api/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: response.credential, loginType: 'user' })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userToken', data.token);
                    window.location.href = '/smsuser/user_dashboard';
                } else {
                    alert(data.message || "Google Login Failed");
                }
            } catch (err) {
                console.error(err);
                alert("Server error during Google login.");
            }
        }

        // --- Standard Login Handler ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaToken = grecaptcha.getResponse();

            if (!captchaToken) {
                alert("Please complete the security check.");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "Processing...";

            try {
                const response = await fetch('/api/user-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, captchaToken })
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('userToken', data.token);
                    window.location.href = '/smsuser/user_dashboard';
                } else {
                    alert(data.message || "Invalid credentials.");
                    grecaptcha.reset();
                }
            } catch (err) {
                alert("Connection failed.");
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign In";
            }
        });
    </script>
</body>
</html>
