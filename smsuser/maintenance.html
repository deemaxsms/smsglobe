<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | SMSGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="relative">
                <div class="absolute inset-0 bg-orange-200 blur-2xl rounded-full opacity-50 animate-pulse"></div>
                <div class="relative bg-white p-6 rounded-3xl shadow-xl border border-orange-100">
                    <svg class="w-16 h-16 text-orange-500 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-extrabold text-slate-900 mb-4">We'll be back shortly!</h1>
        <p class="text-slate-600 mb-8 leading-relaxed">
            SMSGlobe is currently undergoing scheduled maintenance to improve our services. We apologize for any inconvenience.
        </p>

        <div id="noticeContainer" class="hidden mb-8 p-4 bg-blue-50 border border-blue-100 rounded-2xl text-blue-700 text-sm font-medium">
            <span id="adminNotice"></span>
        </div>

        <div class="flex flex-col gap-3">
            <a href="https://wa.me/2347059450227" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-semibold hover:bg-slate-800 transition-all">
                Contact Support
            </a>
            <button onclick="window.location.reload()" class="text-slate-500 text-sm font-medium hover:underline">
                Refresh Page
            </button>
        </div>
    </div>

    <script>
        // Check periodically if maintenance is over
        async function checkStatus() {
            try {
                const res = await fetch('/api/system-status');
                const data = await res.json();
                
                // If maintenance is OFF, take them back home
                if (data.maintenanceMode === false) {
                    window.location.href = '/';
                }
                
                // If there's a specific notice from the Admin, show it
                if (data.noticeBar) {
                    document.getElementById('noticeContainer').classList.remove('hidden');
                    document.getElementById('adminNotice').innerText = data.noticeBar;
                }
            } catch (err) {
                console.error("Connection lost...");
            }
        }

        // Check every 30 seconds
        setInterval(checkStatus, 30000);
        checkStatus();
    </script>
</body>
</html>
