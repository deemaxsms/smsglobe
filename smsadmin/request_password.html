<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Recovery - SMSGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-brand-background min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-[400px]">
        <div class="flex flex-col items-center mb-8">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="h-10 mb-4">
            <h1 class="text-2xl font-bold text-brand-darkText">Account Recovery</h1>
            <p class="text-sm text-brand-lightText mt-2 text-center">Enter your admin email to receive a password reset link.</p>
        </div>

        <div class="bg-white p-8 rounded-[24px] border border-brand-border shadow-xl shadow-blue-100/50">
            <form id="forgotForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-brand-darkText mb-1.5">Admin Email</label>
                    <input type="email" id="email" placeholder="admin@smsglobe.com" 
                        class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-sm" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-brand-darkText text-white py-3.5 rounded-xl text-sm font-bold hover:bg-black transition-all shadow-lg active:scale-[0.98]">
                    <span>Send Reset Link</span>
                </button>

                <div class="text-center mt-4">
                    <a href="sms_login.html" class="text-xs font-bold text-brand-blue hover:underline">Back to Login</a>
                </div>
            </form>

            <div id="successMessage" class="hidden text-center py-4">
                <div class="bg-green-50 text-green-700 p-4 rounded-xl text-sm font-medium mb-4">
                    If an account exists for that email, a reset link has been sent.
                </div>
                <a href="sms_login.html" class="text-sm font-bold text-brand-blue hover:underline">Return to Login</a>
            </div>
        </div>
    </div>

    <script>
        const forgotForm = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = "Processing...";

            try {
                const response = await fetch('/api/admin-forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                // We show success even if email isn't found for security (anti-enumeration)
                forgotForm.classList.add('hidden');
                successMessage.classList.remove('hidden');
            } catch (error) {
                alert('Connection failed. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
