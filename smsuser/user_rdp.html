<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop (RDP) | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        
        /* Tab Pill Styles */
        .tab-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #EAECF0;
            background: white;
            color: #344054;
            white-space: nowrap;
        }

        .tab-pill.active {
            background: #0F54C6;
            color: white;
            border-color: #0F54C6;
            box-shadow: 0 4px 12px rgba(15, 84, 198, 0.2);
        }

        .tab-pill svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button id="closeSidebar" class="lg:hidden text-gray-400 text-xl">&times;</button>
        </div>
        
        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="user_dashboard.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="user_rdp.html" class="flex items-center space-x-3 px-3 py-2 bg-brand-background text-brand-blue rounded-lg text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                <span>RDP</span>
            </a>
        </nav>

        <div class="p-4 border-t border-brand-border">
            <button onclick="logout()" class="flex items-center space-x-3 w-full px-3 py-2 text-red-500 hover:bg-red-50 rounded-lg text-xs font-bold transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span>Log Out</span>
            </button>
        </div>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 md:px-8 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <button id="openSidebar" class="lg:hidden p-1.5 text-brand-midText border border-brand-border rounded-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="text-sm font-bold text-brand-darkText uppercase tracking-tight">RDP Instances</span>
            </div>
        </header>

        <main class="p-4 md:p-8 max-w-6xl w-full mx-auto space-y-8">
            
            <div class="flex items-center justify-center">
                <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="switchTab('all')" id="tab-all" class="tab-pill active active-scale">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        All RDP
                    </button>
                    <button onclick="switchTab('windows')" id="tab-windows" class="tab-pill active-scale">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Windows
                    </button>
                    <button onclick="switchTab('linux')" id="tab-linux" class="tab-pill active-scale">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                        Linux
                    </button>
                    <button onclick="switchTab('server')" id="tab-server" class="tab-pill active-scale">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                        Server
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-brand-border shadow-sm overflow-hidden">
                <div class="p-5 border-b border-brand-border flex items-center justify-between bg-gray-50/30">
                    <h3 class="text-xs font-bold text-brand-darkText uppercase">Available Instances</h3>
                    <div class="text-[10px] text-brand-lightText font-medium">Showing <span id="itemCount">0</span> results</div>
                </div>

                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-white text-[10px] font-bold text-brand-lightText uppercase tracking-wider">
                                <th class="px-8 py-5 border-b border-brand-border">Operating System</th>
                                <th class="px-8 py-5 border-b border-brand-border">Configuration</th>
                                <th class="px-8 py-5 border-b border-brand-border">Region</th>
                                <th class="px-8 py-5 border-b border-brand-border text-center">Pricing</th>
                                <th class="px-8 py-5 border-b border-brand-border text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="rdpList">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

<script>
    const mockData = [
        { id: 1, type: 'windows', name: 'Windows 10 Pro', specs: '8GB RAM / 4 vCPU', loc: 'Virginia, US', price: '15.00', icon: 'https://cdn-icons-png.flaticon.com/512/732/732221.png' },
        { id: 2, type: 'windows', name: 'Windows 11 Pro', specs: '16GB RAM / 6 vCPU', loc: 'London, UK', price: '22.50', icon: 'https://cdn-icons-png.flaticon.com/512/732/732221.png' },
        { id: 3, type: 'linux', name: 'Ubuntu 22.04 LTS', specs: '4GB RAM / 2 vCPU', loc: 'Frankfurt, DE', price: '10.00', icon: 'https://cdn-icons-png.flaticon.com/512/5969/5969241.png' },
        { id: 4, type: 'server', name: 'Win Server 2022', specs: '32GB RAM / 8 vCPU', loc: 'Singapore, SG', price: '45.00', icon: 'https://cdn-icons-png.flaticon.com/512/3663/3663365.png' },
        { id: 5, type: 'server', name: 'Win Server 2019', specs: '16GB RAM / 4 vCPU', loc: 'Chicago, US', price: '30.00', icon: 'https://cdn-icons-png.flaticon.com/512/3663/3663365.png' }
    ];

    function switchTab(type) {
        // Update UI Tabs
        document.querySelectorAll('.tab-pill').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        
        renderItems(type);
    }

    function renderItems(filter) {
        const container = document.getElementById('rdpList');
        const countSpan = document.getElementById('itemCount');
        
        const filtered = filter === 'all' ? mockData : mockData.filter(item => item.type === filter);
        countSpan.innerText = filtered.length;

        container.innerHTML = filtered.map(item => `
            <tr class="hover:bg-brand-background/30 transition-colors group">
                <td class="px-8 py-5 border-b border-brand-border">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-white border border-brand-border rounded-xl flex items-center justify-center p-2 shadow-sm group-hover:border-brand-blue/30 transition-all">
                            <img src="${item.icon}" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <p class="text-xs font-bold text-brand-darkText">${item.name}</p>
                            <p class="text-[10px] text-brand-lightText">Enterprise Grade</p>
                        </div>
                    </div>
                </td>
                <td class="px-8 py-5 border-b border-brand-border">
                    <p class="text-xs font-semibold text-brand-midText">${item.specs}</p>
                    <p class="text-[9px] text-green-500 font-bold uppercase tracking-tighter mt-0.5">1Gbps Uplink</p>
                </td>
                <td class="px-8 py-5 border-b border-brand-border">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold text-brand-midText uppercase">${item.loc}</span>
                    </div>
                </td>
                <td class="px-8 py-5 border-b border-brand-border text-center">
                    <p class="text-sm font-black text-brand-blue">$${item.price}</p>
                    <p class="text-[9px] font-medium text-brand-lightText">Monthly Billing</p>
                </td>
                <td class="px-8 py-5 border-b border-brand-border text-right">
                    <button class="bg-brand-blue text-white text-[10px] font-bold px-6 py-2.5 rounded-xl hover:shadow-lg hover:bg-blue-700 transition-all active-scale">
                        Deploy Now
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Sidebar & Init
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const openBtn = document.getElementById('openSidebar');
    const closeBtn = document.getElementById('closeSidebar');

    const toggleSidebar = () => {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    };

    openBtn.addEventListener('click', toggleSidebar);
    closeBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);

    window.onload = () => switchTab('all');
</script>
</body>
</html>
