<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium VPN Services | High-Speed Global Nodes | SMSGlobe</title>
    <meta name="description" content="Access secure, ultra-fast premium VPN nodes. Encrypted browsing, global server locations, and total privacy.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #0F54C6; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #0F54C6; border-radius: 10px; }
        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate { animation: modalShow 0.3s ease-out forwards; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText mb-20 lg:mb-0">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[60] hidden lg:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-[70] transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-brand-midText">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex-grow p-4 space-y-1 overflow-y-auto no-scrollbar">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Main Menu</p>
            <a href="user_dashboard.html" class="flex items-center space-x-3 px-3 py-2.5 hover:bg-gray-50 rounded-xl text-xs font-medium">
                <span>Dashboard</span>
            </a>
            <a href="user_vpn.html" class="flex items-center space-x-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl text-xs font-bold shadow-sm">
                <span>VPN Nodes</span>
            </a>
            </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-[55] px-4 md:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-brand-background text-brand-blue rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="text-sm md:text-base font-bold text-brand-darkText uppercase tracking-tight">Premium VPN Nodes</h1>
            </div>
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-5 lg:hidden">
        </header>

        <div class="sticky top-[60px] md:top-[73px] z-[50] bg-brand-background/80 backdrop-blur-md px-4 md:px-8 py-3">
            <div class="max-w-7xl mx-auto border-b border-brand-border flex items-center space-x-8">
                <button onclick="switchTab('Phone')" id="tab-Phone" class="tab-active pb-2 text-[11px] md:text-xs font-bold uppercase tracking-wider transition-all">
                    VPN for Phone
                </button>
                <button onclick="switchTab('PC')" id="tab-PC" class="pb-2 text-brand-lightText text-[11px] md:text-xs font-bold uppercase tracking-wider transition-all hover:text-brand-blue">
                    VPN for PC
                </button>
            </div>
        </div>

        <main class="p-4 md:p-8 max-w-7xl w-full mx-auto flex flex-col flex-grow">
            <div id="vpnLoading" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6">
                <div class="h-48 md:h-64 bg-white animate-pulse rounded-2xl"></div>
                <div class="h-48 md:h-64 bg-white animate-pulse rounded-2xl"></div>
            </div>

            <div id="vpnGrid" class="hidden grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6"></div>

            <div id="emptyState" class="hidden text-center py-20">
                <p class="text-xs text-brand-lightText font-medium">No VPN nodes found for this category.</p>
            </div>

            <div class="mt-auto pt-12 mb-10">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-px flex-grow bg-brand-border"></div>
                    <h2 class="text-[10px] md:text-xs font-bold text-brand-lightText uppercase tracking-[0.2em]">Installation Guide</h2>
                    <div class="h-px flex-grow bg-brand-border"></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <div class="bg-white border p-4 rounded-2xl text-center">
                        <span class="w-8 h-8 bg-brand-background text-brand-blue rounded-full inline-flex items-center justify-center font-bold text-xs mb-2">1</span>
                        <p class="text-[10px] font-bold uppercase">Download</p>
                    </div>
                    </div>
            </div>
        </main>
    </div>

    <div id="vpnModal" class="fixed inset-0 bg-brand-darkText/60 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-2xl modal-animate">
            <div class="bg-brand-blue p-8 text-center">
                <h2 id="modalTitle" class="text-2xl font-bold text-white">Payment Successful!</h2>
            </div>
            <div class="p-6 md:p-8 space-y-4">
                <div class="bg-brand-background rounded-xl p-4 border border-brand-border">
                    <p class="text-[9px] font-bold text-brand-blue uppercase mb-1">Username</p>
                    <div class="flex items-center justify-between">
                        <span id="modalUser" class="text-xs font-mono font-bold">---</span>
                        <button onclick="copyToClipboard('modalUser', this)" class="text-brand-blue">Copy</button>
                    </div>
                </div>
                <div class="bg-brand-background rounded-xl p-4 border border-brand-border">
                    <p class="text-[9px] font-bold text-brand-blue uppercase mb-1">Password</p>
                    <div class="flex items-center justify-between">
                        <span id="modalPass" class="text-xs font-mono font-bold text-brand-blue">---</span>
                        <button onclick="copyToClipboard('modalPass', this)" class="text-brand-blue">Copy</button>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full py-4 bg-brand-blue text-white rounded-2xl font-bold">Done</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        let allVPNs = [];
        let currentCategory = 'Phone';

        async function initVPNPage() {
            const token = localStorage.getItem('userToken');
            if (!token) { window.location.href = 'user_login.html'; return; }

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('status') === 'successful') {
                await verifyPayment(urlParams.get('transaction_id'), urlParams.get('tx_ref'));
            }
            await fetchVPNs();
        }

        async function fetchVPNs() {
            try {
                const res = await fetch(`${API_BASE_URL}/products`);
                const data = await res.json();
                if (data.success) {
                    allVPNs = data.products;
                    renderVPNs();
                }
            } catch (err) {
                console.error("Fetch failed", err);
                document.getElementById('vpnLoading').innerHTML = `<p class='col-span-full text-center'>Connection Error</p>`;
            }
        }

        function switchTab(category) {
            currentCategory = category;
            
            // UI Updates
            document.getElementById('tab-Phone').classList.remove('tab-active', 'text-brand-blue');
            document.getElementById('tab-Phone').classList.add('text-brand-lightText');
            document.getElementById('tab-PC').classList.remove('tab-active', 'text-brand-blue');
            document.getElementById('tab-PC').classList.add('text-brand-lightText');

            const activeTab = document.getElementById(`tab-${category}`);
            activeTab.classList.add('tab-active', 'text-brand-blue');
            activeTab.classList.remove('text-brand-lightText');

            renderVPNs();
        }

        function renderVPNs() {
            const grid = document.getElementById('vpnGrid');
            const loader = document.getElementById('vpnLoading');
            const emptyState = document.getElementById('emptyState');
            
            loader.classList.add('hidden');
            grid.classList.remove('hidden');

            // Filter logic: Match Phone, PC, or Both
            const filtered = allVPNs.filter(vpn => {
                const type = vpn.deviceType || 'Both';
                if (type === 'Both') return true;
                return type === currentCategory;
            });

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            grid.innerHTML = filtered.map(vpn => {
                const isOutOfStock = (vpn.stock || 0) <= 0;
                return `
                <div class="bg-white border border-brand-border rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col overflow-hidden">
                    <div class="h-24 md:h-32 bg-gray-50 relative flex items-center justify-center p-4 border-b">
                        <img src="${vpn.image || 'https://via.placeholder.com/150'}" class="max-h-full object-contain ${isOutOfStock ? 'grayscale opacity-50' : ''}">
                    </div>
                    <div class="p-3 md:p-5 flex flex-col flex-grow">
                        <div class="mb-3">
                            <h3 class="font-bold text-brand-darkText text-[10px] md:text-xs uppercase truncate">${vpn.name}</h3>
                            <p class="text-[8px] md:text-[10px] text-brand-lightText font-medium">${vpn.region || 'Global'}</p>
                            <span class="inline-block mt-1 text-[7px] md:text-[9px] font-bold px-1.5 py-0.5 rounded ${isOutOfStock ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}">
                                ${isOutOfStock ? 'Sold Out' : `Stock: ${vpn.stock}`}
                            </span>
                        </div>
                        <div class="bg-brand-background rounded-lg p-2 mb-3">
                            <select id="plan-${vpn._id}" ${isOutOfStock ? 'disabled' : ''} class="w-full bg-white border border-brand-border rounded p-1 text-[9px] md:text-xs font-bold outline-none">
                                ${vpn.plans.map((p, i) => `<option value="${i}">${p.duration} — $${parseFloat(p.price).toFixed(2)}</option>`).join('')}
                            </select>
                        </div>
                        <button onclick="buyVPN('${vpn._id}')" id="btn-${vpn._id}" ${isOutOfStock ? 'disabled' : ''}
                                class="mt-auto w-full py-2.5 md:py-3.5 ${isOutOfStock ? 'bg-gray-200 text-gray-400' : 'bg-brand-blue text-white hover:bg-blue-700'} text-[9px] md:text-xs font-bold rounded-lg transition-all">
                            ${isOutOfStock ? 'Sold Out' : 'Purchase'}
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        async function buyVPN(vpnId) {
            const btn = document.getElementById(`btn-${vpnId}`);
            const token = localStorage.getItem('userToken');
            btn.disabled = true;
            btn.innerText = "Processing...";
            try {
                const res = await fetch(`${API_BASE_URL}/initiate-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ vpnId, planIndex: document.getElementById(`plan-${vpnId}`).value, type: 'VPN' })
                });
                const data = await res.json();
                if (data.success && data.link) window.location.href = data.link;
                else alert(data.message || "Failed to initiate payment");
            } catch (err) { alert("Connection Error"); }
            finally { btn.disabled = false; btn.innerText = "Purchase"; }
        }

        async function verifyPayment(transactionId, txRef) {
            const modal = document.getElementById('vpnModal');
            modal.classList.remove('hidden');
            try {
                const res = await fetch(`${API_BASE_URL}/verify-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('userToken')}` },
                    body: JSON.stringify({ transactionId, txRef })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('modalUser').innerText = data.credentials.username;
                    document.getElementById('modalPass').innerText = data.credentials.password;
                    window.history.replaceState({}, '', window.location.pathname);
                } else { alert(data.message); closeModal(); }
            } catch (err) { closeModal(); }
        }

        function closeModal() { document.getElementById('vpnModal').classList.add('hidden'); }
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        window.onload = initVPNPage;
    </script>
</body>
</html>
