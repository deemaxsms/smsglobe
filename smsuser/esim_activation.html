<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activate eSIM | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        @media (max-width: 640px) { 
            html { font-size: 13px; } 
            .mobile-title { font-size: 1.1rem !important; }
        }
        .animate-flow { animation: fadeInScale 0.4s ease-out forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText mb-20 lg:mb-0">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[60] hidden lg:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-[70] transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-brand-midText">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Services</p>
            <a href="user_dashboard.html" class="flex items-center space-x-3 px-3 py-2.5 text-brand-midText hover:bg-gray-50 rounded-xl text-xs font-medium">
                <span>Dashboard</span>
            </a>
            <a href="esim_activation.html" class="flex items-center space-x-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl text-xs font-bold shadow-sm">
                <span>eSIM Activation</span>
            </a>
            <a href="esim_refill.html" class="flex items-center space-x-3 px-3 py-2.5 text-brand-midText hover:bg-gray-50 rounded-xl text-xs font-medium">
                <span>eSIM Refill</span>
            </a>
        </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-[55] px-4 md:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-brand-background text-brand-blue rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="text-xs md:text-sm font-bold text-brand-darkText uppercase tracking-tight">Activate New eSIM</h1>
            </div>
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-4 lg:hidden">
        </header>

        <main class="p-4 md:p-8 max-w-5xl w-full mx-auto flex flex-grow flex-col">
            
            <div id="selectionView">
                <div class="mb-6">
                    <h2 class="text-lg md:text-xl font-bold text-brand-darkText mobile-title">Choose a Carrier</h2>
                    <p class="text-[10px] md:text-xs text-brand-lightText">Select the network you want to activate today.</p>
                </div>
                
                <div id="loadingState" class="py-20 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-brand-blue border-t-transparent"></div>
                    <p class="mt-4 text-xs font-bold text-brand-lightText uppercase tracking-widest">Fetching Carriers...</p>
                </div>

                <div id="carrierGrid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6 hidden"></div>
            </div>

            <div id="formView" class="hidden animate-flow">
                <button onclick="goBack()" class="mb-5 flex items-center gap-2 text-[10px] font-bold text-brand-blue uppercase hover:translate-x-[-4px] transition-transform">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Selection
                </button>
                
                <div class="bg-white border border-brand-border rounded-2xl md:rounded-3xl overflow-hidden shadow-sm max-w-xl mx-auto">
                    <div class="bg-brand-blue p-6 md:p-8 text-center text-white">
                        <div class="bg-white w-16 h-16 md:w-20 md:h-20 rounded-xl p-3 mx-auto mb-4 shadow-lg">
                            <img id="formCarrierLogo" src="" class="w-full h-full object-contain">
                        </div>
                        <h2 id="formCarrierName" class="text-xl md:text-2xl font-bold">--</h2>
                        <div id="carrierBadge" class="inline-block bg-white/20 px-3 py-1 rounded-full text-[9px] uppercase font-bold tracking-widest mt-2">--</div>
                    </div>

                    <div class="p-6 md:p-10 space-y-6">
                        <div id="carrierDesc" class="text-center text-xs text-brand-lightText italic leading-relaxed"></div>

                        <div>
                            <label class="text-[10px] font-bold text-brand-blue uppercase tracking-wider mb-2 block">Choose Plan Type</label>
                            <select id="planSelector" class="w-full bg-brand-background border border-brand-border p-4 rounded-xl text-xs md:text-sm font-bold focus:ring-2 focus:ring-brand-blue outline-none appearance-none cursor-pointer"></select>
                        </div>

                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-bold text-brand-blue uppercase">Total Amount</span>
                                <span id="totalPrice" class="text-lg font-black text-brand-blue">₦0.00</span>
                            </div>
                        </div>

                        <button onclick="handleActivation()" id="activateBtn" class="w-full py-4 bg-brand-blue text-white rounded-xl text-xs md:text-sm font-bold shadow-xl hover:bg-blue-700 active:scale-[0.98] transition-all">
                            Pay & Activate eSIM
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allCarriers = [];
        let selectedCarrier = null;
        const NAIRA_RATE = 1650; // Sync with your logic

        async function fetchCarriers() {
            try {
                const res = await fetch('/api/carriers');
                const data = await res.json();
                
                if (data.success) {
                    allCarriers = data.carriers;
                    renderGrid();
                }
            } catch (err) {
                console.error("Failed to load carriers", err);
                document.getElementById('loadingState').innerHTML = `<p class="text-red-500 font-bold">Failed to load carriers. Refresh page.</p>`;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('carrierGrid');
            const loading = document.getElementById('loadingState');
            
            grid.innerHTML = allCarriers.map((c, index) => `
                <div onclick="openCarrier(${index})" class="bg-white border border-brand-border p-5 md:p-8 rounded-2xl md:rounded-3xl cursor-pointer hover:shadow-xl transition-all group text-center flex flex-col items-center">
                    <div class="h-12 md:h-16 mb-4 flex items-center justify-center">
                        <img src="${c.imageUrl}" class="max-h-full object-contain group-hover:scale-110 transition-transform">
                    </div>
                    <h3 class="text-xs font-bold text-brand-darkText uppercase mb-1">${c.carrierName}</h3>
                    <span class="text-[9px] font-bold text-brand-blue bg-brand-background px-2 py-0.5 rounded">${c.accountType}</span>
                </div>
            `).join('');

            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        function openCarrier(index) {
            selectedCarrier = allCarriers[index];
            
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('formView').classList.remove('hidden');
            
            document.getElementById('formCarrierLogo').src = selectedCarrier.imageUrl;
            document.getElementById('formCarrierName').innerText = selectedCarrier.carrierName;
            document.getElementById('carrierBadge').innerText = selectedCarrier.accountType;
            document.getElementById('carrierDesc').innerText = selectedCarrier.description || "Fast activation and reliable coverage.";
            
            // Populate Plans
            const plans = selectedCarrier.accountType === 'Prepaid' 
                ? selectedCarrier.prepaidPlans 
                : selectedCarrier.subscriptionPlans;
            
            // Assuming plans are comma separated or a single string
            const planList = plans.split(',').map(p => p.trim());
            const selector = document.getElementById('planSelector');
            selector.innerHTML = planList.map(p => `<option value="${p}">${p}</option>`).join('');
            
            updatePrice();
        }

        function updatePrice() {
            const planText = document.getElementById('planSelector').value;
            // Extract numbers from string (e.g., "$15 plan" -> 15)
            const usdMatch = planText.match(/\d+/);
            const usd = usdMatch ? parseInt(usdMatch[0]) : 0;
            const naira = usd * NAIRA_RATE;
            
            document.getElementById('totalPrice').innerText = `₦${naira.toLocaleString()}`;
        }

        document.getElementById('planSelector').addEventListener('change', updatePrice);

        function goBack() {
            document.getElementById('selectionView').classList.remove('hidden');
            document.getElementById('formView').classList.add('hidden');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        async function handleActivation() {
            const plan = document.getElementById('planSelector').value;
            const btn = document.getElementById('activateBtn');
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const res = await fetch('/api/initiate-payment', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('userToken')}` 
                    },
                    body: JSON.stringify({
                        carrierName: selectedCarrier.carrierName,
                        planAmount: plan,
                        productType: 'eSIM_Activation',
                        productImage: selectedCarrier.imageUrl
                    })
                });

                const data = await res.json();
                if (data.success && data.link) {
                    window.location.href = data.link;
                } else {
                    alert(data.message || "Payment initiation failed");
                    btn.disabled = false;
                    btn.innerText = "Pay & Activate eSIM";
                }
            } catch (err) {
                alert("Server Error");
                btn.disabled = false;
            }
        }

        window.onload = fetchCarriers;
    </script>
</body>
</html>
