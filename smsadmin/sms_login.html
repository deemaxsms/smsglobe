<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Login</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; }
        .logo-img { height: 36px; width: auto; object-fit: contain; }
        @media (min-width: 768px) { .logo-img { height: 44px; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans">

    <div class="w-full max-w-[400px]">
        <div class="flex flex-col items-center mb-6 sm:mb-8">
            <a href="/">
                <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="logo-img mb-3 sm:mb-4">
            </a>
            <h1 class="text-xl sm:text-2xl font-bold text-brand-darkText">Admin Login</h1>
            <p class="text-[13px] sm:text-sm text-brand-lightText mt-1 sm:mt-2 text-center">Secure access for SMSGlobe administrators.</p>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-[20px] sm:rounded-[24px] border border-brand-border shadow-xl shadow-blue-100/50">
            <form id="loginForm" class="space-y-4 sm:space-y-5">
                <div>
                    <label class="block text-[12px] sm:text-sm font-semibold text-brand-darkText mb-1.5">Email Address</label>
                    <input type="email" id="email" placeholder="admin@smsglobe.com" 
                        class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-[13px] sm:text-sm" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-[12px] sm:text-sm font-semibold text-brand-darkText">Password</label>
                        <a href="request_password.html" class="text-[11px] sm:text-xs font-bold text-brand-blue hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••" 
                            class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-[13px] sm:text-sm" required>
                        
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-lightText hover:text-brand-blue transition-colors p-1">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path id="eye-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path id="eye-outer-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex justify-center py-2">
                    <div class="g-recaptcha"data-sitekey="6Lchfa0sAAAAAMmRum4xNJHD-6RY7udDf6WSTSeW"></div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-brand-darkText text-white py-3 sm:py-3.5 rounded-xl text-[14px] sm:text-sm font-bold hover:bg-black transition-all shadow-lg mt-2 flex justify-center items-center gap-2 active:scale-[0.98]">
                    <span>Sign in to Dashboard</span>
                </button>

                <div class="relative py-3 sm:py-4 flex items-center">
                    <div class="flex-grow border-t border-brand-border"></div>
                    <span class="flex-shrink mx-4 text-[10px] sm:text-xs font-medium text-brand-lightText uppercase tracking-widest">Or Google Access</span>
                    <div class="flex-grow border-t border-brand-border"></div>
                </div>

                <div id="g_id_onload"
                    data-client_id="200301370065-fl80h2idsgants6kb6jcuaivkonljs6u.apps.googleusercontent.com"
                    data-context="signin"
                    data-ux_mode="popup"
                    data-callback="handleGoogleResponse"
                    data-auto_prompt="false">
                </div>

                <div class="g_id_signin w-full flex justify-center"
                    data-type="standard"
                    data-shape="rectangular"
                    data-theme="outline"
                    data-text="signin_with"
                    data-size="large"
                    data-logo_alignment="left">
                </div>
            </form>
        </div>

        <p class="mt-6 sm:mt-8 text-center text-[10px] sm:text-xs text-brand-lightText">
            © 2026 SMSGlobe. This is a protected administrative area.
        </p>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            // Icon Paths
            const eyeOpen = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            `;
            const eyeClosed = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L4.573 4.574m14.853 14.853L14.12 14.12M21.543 12A9.981 9.981 0 0012 5c-1.838 0-3.535.494-4.99 1.357" />
            `;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = eyeClosed;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = eyeOpen;
            }
        }

        async function handleGoogleResponse(response) {
            try {
                const res = await fetch('/api/google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: response.credential, loginType: 'admin' })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('smsglobe_admin_token', data.token);
                    window.location.href = 'sms_dashboard.html';
                } else {
                    alert("Admin Access Denied: " + (data.message || "Unauthorized account"));
                }
            } catch (err) {
                alert("Server error during admin authentication.");
            }
        }

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const captchaResponse = grecaptcha.getResponse();
            if (!captchaResponse) {
                alert("Please verify security check.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.querySelector('span').innerText = "Verifying Admin...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        captchaToken: captchaResponse
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('smsglobe_admin_token', data.token);
                    window.location.href = 'sms_dashboard.html';
                } else {
                    alert(data.message || 'Access Denied.');
                    grecaptcha.reset();
                    submitBtn.disabled = false;
                    submitBtn.querySelector('span').innerText = "Sign in to Dashboard";
                }
            } catch (error) {
                alert('Connection failed.');
                grecaptcha.reset();
                submitBtn.disabled = false;
                submitBtn.querySelector('span').innerText = "Sign in to Dashboard";
            }
        });
    </script>
</body>
</html>
