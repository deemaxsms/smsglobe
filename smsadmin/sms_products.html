<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 13px; }
        @media (min-width: 1024px) { body { font-size: 14px; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EAECF0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-7">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-10 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="sms_users.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            Users
                        </a>
                        <a href="sms_products.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                            Products
                        </a>
                    </nav>
                </div>

                <div class="p-5 border-t border-brand-border bg-gray-50/50">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold tracking-tight">Product Inventory</h2>
                    <p class="text-brand-lightText">Manage your database listings</p>
                </div>
                <button onclick="openAddModal()" class="bg-brand-blue text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <span class="text-lg leading-none">+</span> Add Product
                </button>
            </header>

            <div class="bg-white rounded-2xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-brand-border">
                            <tr>
                                <th class="px-6 py-4 text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Product Detail</th>
                                <th class="px-6 py-4 text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Provider</th>
                                <th class="px-6 py-4 text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Price</th>
                                <th class="px-6 py-4 text-[11px] font-bold uppercase tracking-wider text-brand-lightText text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="product-list" class="divide-y divide-brand-border">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/50 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-brand-border flex justify-between items-center bg-white rounded-t-2xl">
                <h3 id="modalTitle" class="text-lg font-bold">New Product Listing</h3>
                <button onclick="closeModal()" class="text-brand-lightText hover:text-red-500 transition-colors p-1">✕</button>
            </div>
            
            <form id="productForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5 overflow-y-auto">
                <input type="hidden" id="productId" name="productId">
                
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Product Name</label>
                    <input type="text" id="name" name="name" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Image Asset URL</label>
                    <input type="text" id="image" name="image" placeholder="https://imgur.com/..." class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all" oninput="previewImage(this.value)">
                    <div id="imgPreviewContainer" class="mt-3 hidden">
                        <img id="imgPreview" src="" class="h-16 w-16 object-cover rounded-xl border border-brand-border shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Provider</label>
                    <input type="text" id="provider" name="provider" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Region</label>
                    <input type="text" id="region" name="region" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Duration</label>
                    <input type="text" id="duration" name="duration" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Price (USD)</label>
                    <input type="number" step="0.01" id="price" name="price" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-2 bg-brand-background p-5 rounded-2xl border border-blue-100">
                    <p class="font-bold text-brand-blue mb-4 text-[10px] uppercase tracking-widest flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        Access Credentials
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="username" name="username" placeholder="User ID / Email" class="w-full bg-white border border-brand-border p-2.5 rounded-lg text-sm">
                        <input type="text" id="password" name="password" placeholder="Key / Password" class="w-full bg-white border border-brand-border p-2.5 rounded-lg text-sm">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Instructions</label>
                    <textarea id="instructions" name="instructions" rows="2" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all text-sm"></textarea>
                </div>

                <div class="md:col-span-2 pt-2">
                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">
                        Sync with Database
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    let allProducts = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    async function fetchProducts() {
        const token = localStorage.getItem('smsglobe_admin_token');
        const list = document.getElementById('product-list');
        
        try {
            const res = await fetch('/api/products', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            allProducts = data.products || [];
            
            if (allProducts.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-brand-lightText italic text-xs">No products found.</td></tr>';
                return;
            }

            list.innerHTML = allProducts.map(p => `
                <tr class="hover:bg-brand-background/30 transition-colors">
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-gray-50 border border-brand-border overflow-hidden flex-shrink-0">
                                <img src="${p.image || 'https://via.placeholder.com/40'}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <div class="font-bold text-brand-darkText">${p.name}</div>
                                <div class="text-[11px] text-brand-lightText">${p.duration}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="text-sm font-medium">${p.provider}</div>
                        <div class="text-[10px] text-brand-orange font-bold uppercase tracking-wider">${p.region}</div>
                    </td>
                    <td class="px-6 py-5 font-bold text-brand-blue">$${parseFloat(p.price).toFixed(2)}</td>
                    <td class="px-6 py-5 text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="editProduct('${p._id}')" class="text-brand-blue hover:text-blue-800 font-bold text-[11px] uppercase">Edit</button>
                            <button onclick="deleteProduct('${p._id}')" class="text-red-500 hover:text-red-700 font-bold text-[11px] uppercase">Del</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            list.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500">Connection error.</td></tr>';
        }
    }

    function previewImage(url) {
        const container = document.getElementById('imgPreviewContainer');
        const img = document.getElementById('imgPreview');
        if (url && url.startsWith('http')) {
            img.src = url;
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
    }

    function openAddModal() {
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        document.getElementById('imgPreviewContainer').classList.add('hidden');
        document.getElementById('modalTitle').innerText = 'New Product Listing';
        document.getElementById('submitBtn').innerText = 'Sync with Database';
        document.getElementById('productModal').classList.remove('hidden');
    }

    function editProduct(id) {
        const p = allProducts.find(item => item._id === id);
        if (!p) return;

        document.getElementById('productId').value = p._id;
        document.getElementById('name').value = p.name;
        document.getElementById('image').value = p.image || '';
        document.getElementById('provider').value = p.provider;
        document.getElementById('region').value = p.region;
        document.getElementById('duration').value = p.duration;
        document.getElementById('price').value = p.price;
        document.getElementById('username').value = p.username || '';
        document.getElementById('password').value = p.password || '';
        document.getElementById('instructions').value = p.instructions || '';

        if (p.image) previewImage(p.image);
        document.getElementById('modalTitle').innerText = 'Update Listing';
        document.getElementById('submitBtn').innerText = 'Save Changes';
        document.getElementById('productModal').classList.remove('hidden');
    }

    async function deleteProduct(id) {
        if (!confirm('Permanently delete this product?')) return;
        const token = localStorage.getItem('smsglobe_admin_token');
        await fetch(`/api/products?id=${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        fetchProducts();
    }

    function closeModal() {
        document.getElementById('productModal').classList.add('hidden');
    }

    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        const productData = Object.fromEntries(new FormData(e.target));
        const token = localStorage.getItem('smsglobe_admin_token');
        const id = document.getElementById('productId').value;
        
        const method = id ? 'PATCH' : 'POST';
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        try {
            const res = await fetch('/api/products', {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(productData)
            });

            if (res.ok) {
                closeModal();
                fetchProducts();
            } else {
                alert('Update failed.');
            }
        } catch (e) {
            alert('Network error.');
        } finally {
            btn.disabled = false;
            btn.innerText = id ? 'Save Changes' : 'Sync with Database';
        }
    };

    function logout() {
        localStorage.removeItem('smsglobe_admin_token');
        window.location.href = 'sms_login.html';
    }

    window.onload = fetchProducts;
</script>
</body>
</html>
