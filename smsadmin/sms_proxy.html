<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Proxy Management</title>
    <link rel="icon" type="image/png" href="https://imgur.com/8YeZgfx.png">
    <link rel="apple-touch-icon" href="https://imgur.com/8YeZgfx.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 13px; }
        @media (min-width: 1024px) { body { font-size: 14px; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EAECF0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[70] hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[80] w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-20 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="sms_users.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            Users
                        </a>
                        <a href="sms_vpn.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            VPN Nodes
                        </a>
                        <a href="sms_proxy.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                            Proxy Nodes
                        </a>
                         <a href="transaction_history.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Transaction History
                        </a>
                    </nav>
                </div>
                <div class="p-5 border-t border-brand-border bg-gray-50/50">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold tracking-tight">Proxy Inventory</h2>
                    <p class="text-brand-lightText text-xs md:text-sm">Manage Active Packages and Node Deployment</p>
                </div>
                <button onclick="openAddProxyModal()" class="bg-brand-blue text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <span class="text-lg leading-none">+</span> Add Proxy Package
                </button>
            </header>

            <div class="bg-white rounded-2xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 border-b border-brand-border">
                            <tr>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Package</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Category</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Inventory</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText text-center">Activation</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="proxy-list" class="divide-y divide-brand-border"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="proxyModal" class="fixed inset-0 bg-black/50 z-[90] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-brand-border flex justify-between items-center bg-white sticky top-0 z-10">
                <h3 id="modalTitle" class="text-lg font-bold">Proxy Package Configuration</h3>
                <button onclick="closeModal()" class="text-brand-lightText hover:text-red-500 transition-colors p-1">✕</button>
            </div>
            
            <form id="proxyForm" class="p-6 grid grid-cols-1 gap-5 overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Image URL</label>
                        <input type="url" id="imageUrl" name="imageUrl" placeholder="https://example.com/proxy.png" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Category</label>
                        <input type="text" id="category" name="category" placeholder="e.g. Residential, Mobile" required class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Proxy/Package Name</label>
                        <input type="text" id="name" name="name" required placeholder="e.g. UK Residential High-Speed" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Stock Available</label>
                        <input type="number" id="stock" name="stock" required placeholder="e.g. 100" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl border border-brand-border">
                    <label class="block text-[10px] font-bold text-brand-midText mb-3 uppercase tracking-widest">Inventory & Pricing Plans</label>
                    <div id="pricingContainer" class="space-y-3"></div>
                    <button type="button" onclick="addPriceRow()" class="mt-4 text-brand-blue font-bold text-[11px] uppercase flex items-center gap-1 hover:text-blue-700">
                        <span class="text-base">+</span> Add IP/Price Tier
                    </button>
                </div>

                <div class="bg-orange-50/50 p-4 rounded-xl border border-orange-100">
                    <label class="block text-[10px] font-bold text-brand-orange mb-1.5 uppercase tracking-widest">Activation Code</label>
                    <input type="text" id="activationCode" placeholder="G-XXXX-XXXX-XXXX" class="w-full bg-white border border-brand-border p-3 rounded-xl outline-none focus:border-brand-orange transition-all font-mono mb-4">
                    
                    <label class="block text-[10px] font-bold text-brand-orange mb-1.5 uppercase tracking-widest">Setup Instructions</label>
                    <textarea id="instructions" rows="3" placeholder="Step-by-step instructions for the user..." class="w-full bg-white border border-brand-border p-3 rounded-xl outline-none focus:border-brand-orange transition-all text-sm"></textarea>
                </div>

                <div class="pt-2 sticky bottom-0 bg-white">
                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-[0.98]">
                        Deploy Proxy Package
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    let allProxies = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    function addPriceRow(ipCount = '', price = '') {
        const container = document.getElementById('pricingContainer');
        const row = document.createElement('div');
        row.className = 'pricing-row flex gap-3 items-center animate-in fade-in duration-300';
        row.innerHTML = `
            <div class="flex-1">
                <input type="number" placeholder="No. of IPs" value="${ipCount}" class="plan-ips w-full bg-white border border-brand-border px-3 py-2.5 rounded-lg text-sm" required>
            </div>
            <div class="relative flex-1">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-brand-lightText">$</span>
                <input type="number" step="0.01" placeholder="Price" value="${price}" class="plan-price w-full bg-white border border-brand-border pl-7 pr-3 py-2.5 rounded-lg text-sm" required>
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="p-2 text-red-400 hover:text-red-600">✕</button>
        `;
        container.appendChild(row);
    }

    async function fetchProxies() {
        const token = localStorage.getItem('smsglobe_admin_token');
        const list = document.getElementById('proxy-list');
        try {
            const res = await fetch('/api/proxies', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const data = await res.json();
            allProxies = data.proxies || [];
            
            if (allProxies.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-brand-lightText">No proxy packages found.</td></tr>';
                return;
            }

            list.innerHTML = allProxies.map(p => {
                const plans = p.plans || [];
                const stockStatus = p.stock > 0 ? `${p.stock} units` : 'Out of Stock';
                const stockColor = p.stock > 10 ? 'text-brand-midText' : 'text-red-500 font-bold';
                
                return `
                    <tr class="hover:bg-brand-background/30 transition-colors">
                        <td class="px-6 py-5">
                            <div class="flex items-center gap-3">
                                <img src="${p.imageUrl || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-lg object-cover bg-gray-100">
                                <div>
                                    <div class="font-bold text-brand-darkText">${p.name}</div>
                                    <div class="text-[10px] text-brand-lightText font-mono">Code: ${p.activationCode || 'N/A'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-5">
                            <span class="bg-brand-background text-brand-blue px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider border border-blue-100">
                                ${p.category || 'Standard'}
                            </span>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-xs font-bold text-brand-midText">${plans.length} Pricing Plans</div>
                            <div class="text-[10px] ${stockColor}">${stockStatus}</div>
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="px-2.5 py-1 rounded-full font-bold text-[10px] ${p.activationCode ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} uppercase">
                                ${p.activationCode ? 'Ready' : 'No Code'}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-right flex justify-end gap-3">
                            <button onclick="editProxy('${p._id}')" class="text-brand-blue font-bold text-[10px] hover:underline">EDIT</button>
                            <button onclick="deleteProxy('${p._id}')" class="text-red-500 font-bold text-[10px] hover:underline">DEL</button>
                        </td>
                    </tr>`;
            }).join('');
        } catch (err) { 
            list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500">Error connecting to API.</td></tr>'; 
        }
    }

    function editProxy(id) {
        const proxy = allProxies.find(p => p._id === id);
        if (!proxy) return;

        const form = document.getElementById('proxyForm');
        form.dataset.editId = id; 
        
        document.getElementById('modalTitle').innerText = 'Update Proxy Package';
        document.getElementById('submitBtn').innerText = 'Update Changes';
        
        document.getElementById('name').value = proxy.name;
        document.getElementById('category').value = proxy.category || '';
        document.getElementById('stock').value = proxy.stock || 0;
        document.getElementById('imageUrl').value = proxy.imageUrl || '';
        document.getElementById('activationCode').value = proxy.activationCode || '';
        document.getElementById('instructions').value = proxy.instructions || '';
        
        const container = document.getElementById('pricingContainer');
        container.innerHTML = '';
        if (proxy.plans && proxy.plans.length > 0) {
            proxy.plans.forEach(plan => addPriceRow(plan.ip_count, plan.price));
        } else {
            addPriceRow();
        }

        document.getElementById('proxyModal').classList.remove('hidden');
    }

    async function deleteProxy(id) {
        if (!confirm('Are you sure you want to delete this proxy package?')) return;
        const token = localStorage.getItem('smsglobe_admin_token');
        try {
            const res = await fetch(`/api/proxies?id=${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) fetchProxies();
            else alert(data.message || 'Delete failed');
        } catch (err) { alert('Server error during deletion.'); }
    }

    document.getElementById('proxyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('submitBtn');
        const token = localStorage.getItem('smsglobe_admin_token');
        const editId = form.dataset.editId;
        
        btn.disabled = true;
        btn.innerText = 'Processing...';

        const payload = {
            name: document.getElementById('name').value,
            category: document.getElementById('category').value,
            stock: parseInt(document.getElementById('stock').value) || 0,
            imageUrl: document.getElementById('imageUrl').value,
            activationCode: document.getElementById('activationCode').value,
            instructions: document.getElementById('instructions').value,
            plans: Array.from(document.querySelectorAll('.pricing-row')).map(row => ({
                ip_count: row.querySelector('.plan-ips').value,
                price: row.querySelector('.plan-price').value
            }))
        };

        if (editId) payload.proxyId = editId;

        try {
            const res = await fetch('/api/proxies', {
                method: editId ? 'PATCH' : 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            const result = await res.json();
            if(result.success) {
                closeModal();
                fetchProxies();
            } else alert(result.message || 'Action failed');
        } catch (err) { alert('Error connecting to server.'); }
        finally {
            btn.disabled = false;
            btn.innerText = editId ? 'Update Changes' : 'Deploy Proxy Package';
        }
    });

    function openAddProxyModal() {
        const form = document.getElementById('proxyForm');
        delete form.dataset.editId; 
        form.reset();
        document.getElementById('modalTitle').innerText = 'Proxy Package Configuration';
        document.getElementById('submitBtn').innerText = 'Deploy Proxy Package';
        document.getElementById('pricingContainer').innerHTML = '';
        addPriceRow();
        document.getElementById('proxyModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('proxyModal').classList.add('hidden'); }
    function logout() { localStorage.removeItem('smsglobe_admin_token'); window.location.href = 'sms_login.html'; }
    window.onload = fetchProxies;
</script>
</body>
</html>
