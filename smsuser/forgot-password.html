<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-brand-background min-h-screen flex flex-col font-sans">

    <nav class="p-4 md:p-6">
        <div class="max-w-[1536px] mx-auto">
            <a href="user_login.html" class="inline-flex items-center text-brand-blue font-bold text-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Login
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 pb-8">
        <div class="w-full max-w-[400px]">
            <div class="bg-white rounded-[24px] border border-brand-border shadow-xl p-6 md:p-10">
                <div class="text-center mb-6">
                    <h1 class="text-xl md:text-2xl font-extrabold text-brand-darkText mb-1.5">Reset Password</h1>
                    <p class="text-brand-lightText text-xs md:text-sm">We'll send a password reset link to your email.</p>
                </div>

                <form id="forgotForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-brand-midText mb-1">Email Address</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder:text-gray-400"
                            placeholder="Enter your registered email">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-3 md:py-4 rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                        Send Reset Link
                    </button>
                </form>

                <div id="statusMessage" class="hidden mt-4 p-3 rounded-lg text-xs text-center"></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMessage');

            btn.disabled = true;
            btn.innerText = "Sending Link...";

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
                
                if (data.success) {
                    status.innerText = data.message || "Please check your email for instructions.";
                    status.classList.add('bg-green-50', 'text-green-700');
                    btn.classList.add('hidden'); // Hide button after success
                } else {
                    status.innerText = data.message || "Failed to send reset link.";
                    status.classList.add('bg-red-50', 'text-red-700');
                    btn.disabled = false;
                    btn.innerText = "Send Reset Link";
                }
            } catch (err) {
                alert("Network error. Please try again.");
                btn.disabled = false;
                btn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
