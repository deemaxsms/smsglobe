<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Manage Carriers</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 13px; }
        @media (min-width: 1024px) { body { font-size: 14px; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .custom-shadow { box-shadow: 0 4px 15px rgba(15, 84, 198, 0.05); }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="Logo" class="h-6">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[70] hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[80] w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-20 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Dashboard
                        </a>
                        <a href="esim_activation.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            eSIM Setup
                        </a>
                    </nav>
                </div>
                <div class="p-5 border-t border-brand-border">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <header class="mb-8">
                <h2 class="text-xl md:text-2xl font-bold tracking-tight">Carrier Management</h2>
                <p class="text-brand-lightText text-xs md:text-sm">Upload and configure new eSIM carrier products.</p>
            </header>

            <div class="bg-white rounded-3xl border border-brand-border p-6 md:p-8 custom-shadow mb-10">
                <h3 class="text-brand-blue font-bold text-base mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add New Carrier
                </h3>
                <form id="carrier-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-brand-lightText uppercase mb-2 tracking-wider">Carrier Name</label>
                        <input type="text" id="carrierName" placeholder="e.g. Verizon, T-Mobile" class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue outline-none bg-gray-50/50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-brand-lightText uppercase mb-2 tracking-wider">Account Type</label>
                        <select id="accountType" class="w-full px-4 py-3 rounded-xl border border-brand-border outline-none bg-gray-50/50">
                            <option value="Prepaid">Prepaid</option>
                            <option value="Postpaid">Postpaid</option>
                            <option value="Data Only">Data Only</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-brand-lightText uppercase mb-2 tracking-wider">eSIM Duration</label>
                        <input type="text" id="duration" placeholder="e.g. 30 Days, Unlimited" class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue outline-none bg-gray-50/50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-brand-lightText uppercase mb-2 tracking-wider">eSIM Image URL</label>
                        <input type="url" id="imageUrl" placeholder="https://imgur.com/your-image.png" class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue outline-none bg-gray-50/50" required>
                    </div>
                    <div class="md:col-span-2 pt-2">
                        <button type="submit" class="w-full md:w-fit px-10 py-3.5 bg-brand-blue text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-transform active:scale-95">
                            Upload Carrier Product
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-3xl border border-brand-border shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-brand-border bg-gray-50/50 flex justify-between items-center">
                    <h4 class="font-bold text-xs uppercase tracking-widest text-brand-midText">Active Carriers</h4>
                    <span id="carrier-count" class="bg-brand-blue/10 text-brand-blue px-3 py-1 rounded-full text-[10px] font-bold">0 Total</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px] md:text-xs">
                        <thead class="bg-gray-50/50 text-brand-lightText uppercase">
                            <tr>
                                <th class="px-6 py-4 font-bold">Preview</th>
                                <th class="px-6 py-4 font-bold">Carrier Details</th>
                                <th class="px-6 py-4 font-bold">Type</th>
                                <th class="px-6 py-4 font-bold">Duration</th>
                                <th class="px-6 py-4 font-bold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="carrier-list-body" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        const token = localStorage.getItem('smsglobe_admin_token');

        // Fetch and display carriers
        async function loadCarriers() {
            const listBody = document.getElementById('carrier-list-body');
            try {
                const res = await fetch('/api/admin/get-carriers', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('carrier-count').innerText = `${data.carriers.length} Total`;
                    listBody.innerHTML = data.carriers.map(c => `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-6 py-4">
                                <img src="${c.imageUrl}" class="h-10 w-14 object-cover rounded-lg border border-brand-border" alt="carrier">
                            </td>
                            <td class="px-6 py-4 font-bold text-brand-darkText">${c.carrierName}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 bg-brand-background text-brand-blue rounded-md text-[10px] font-bold uppercase">${c.accountType}</span>
                            </td>
                            <td class="px-6 py-4 text-brand-midText">${c.duration}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="deleteCarrier('${c._id}')" class="text-red-500 hover:text-red-700 font-bold transition-colors">Remove</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        // Handle form submission
        document.getElementById('carrier-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                carrierName: document.getElementById('carrierName').value,
                accountType: document.getElementById('accountType').value,
                duration: document.getElementById('duration').value,
                imageUrl: document.getElementById('imageUrl').value
            };

            try {
                const res = await fetch('/api/admin/add-carrier', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.success) {
                    alert("Carrier added successfully!");
                    document.getElementById('carrier-form').reset();
                    loadCarriers();
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Server error. Check connection.");
            }
        });

        // Delete function
        async function deleteCarrier(id) {
            if (!confirm("Are you sure you want to remove this carrier?")) return;

            try {
                const res = await fetch(`/api/admin/delete-carrier/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) { loadCarriers(); }
            } catch (err) {
                alert("Delete failed.");
            }
        }

        function logout() {
            localStorage.removeItem('smsglobe_admin_token');
            window.location.href = 'sms_login.html';
        }

        window.onload = loadCarriers;
    </script>
</body>
</html>
