<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eSIM Refill | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Responsive scaling for mobile */
        @media (max-width: 640px) { 
            html { font-size: 13px; } 
            .mobile-title { font-size: 1.1rem !important; }
            .mobile-label { font-size: 9px !important; }
            .mobile-input { font-size: 13px !important; padding: 0.75rem !important; }
        }

        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-flow { animation: fadeInScale 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText mb-20 lg:mb-0">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[60] hidden lg:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-[70] transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-brand-midText">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="user_dashboard.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium">

                <span>Dashboard</span>
            </a>
            <a href="buy_number.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span>Buy Number</span>
            </a>
            <a href="esim_refill.html" class="flex items-center space-x-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl text-xs font-bold shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                <span>eSIMs Refill</span>
            </a>
            <a href="user_vpn.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span>VPNs</span>
            </a>
            <a href="user_proxy.html" class="flex items-center space-x-3 px-3 py-2.5 text-brand-midText hover:bg-gray-50 rounded-xl text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span>Proxies</span>
            </a>
        </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-[55] px-4 md:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-brand-background text-brand-blue rounded-xl">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="text-xs md:text-sm font-bold text-brand-darkText uppercase tracking-tight">eSIM Refill</h1>
            </div>
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-4 lg:hidden">
        </header>

        <main class="p-4 md:p-8 max-w-5xl w-full mx-auto flex flex-col flex-grow">
            
            <div id="selectionView">
                <div class="mb-6">
                    <h2 class="text-lg md:text-xl font-bold text-brand-darkText mobile-title">Select a Carrier</h2>
                    <p class="text-[10px] md:text-xs text-brand-lightText">Choose your provider to begin the refill.</p>
                </div>
                <div id="carrierGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6">
                </div>
            </div>

            <div id="formView" class="hidden animate-flow">
                <button onclick="goBackToGrid()" class="mb-5 flex items-center gap-2 text-[10px] font-bold text-brand-blue uppercase hover:translate-x-[-4px] transition-transform">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Carriers
                </button>
                
                <div class="bg-white border border-brand-border rounded-2xl md:rounded-3xl overflow-hidden shadow-sm max-w-xl mx-auto">
                    <div class="bg-brand-blue p-6 md:p-8 text-center text-white">
                        <div class="bg-white w-16 h-16 md:w-20 md:h-20 rounded-xl md:rounded-2xl p-3 mx-auto mb-4 shadow-lg">
                            <img id="formCarrierLogo" src="" class="w-full h-full object-contain">
                        </div>
                        <h2 id="formCarrierName" class="text-xl md:text-2xl font-bold">--</h2>
                        <p class="text-blue-100 text-[9px] uppercase font-bold tracking-widest mt-1">Direct Refill Portal</p>
                    </div>

                    <div class="p-5 md:p-10 space-y-5">
                        <div>
                            <label class="text-[9px] md:text-[10px] font-bold text-brand-blue uppercase tracking-wider mb-2 block mobile-label">eSIM Mobile Number</label>
                            <input type="text" id="targetNumber" placeholder="+1 (000) 000-0000" class="w-full bg-brand-background border border-brand-border p-3 md:p-4 rounded-xl md:rounded-2xl text-xs md:text-sm font-bold focus:ring-2 focus:ring-brand-blue outline-none transition-all mobile-input">
                        </div>
                        
                        <div>
                            <label class="text-[9px] md:text-[10px] font-bold text-brand-blue uppercase tracking-wider mb-2 block mobile-label">Refill Amount (USD)</label>
                            <select id="planSelector" class="w-full bg-brand-background border border-brand-border p-3 md:p-4 rounded-xl md:rounded-2xl text-xs md:text-sm font-bold focus:ring-2 focus:ring-brand-blue outline-none appearance-none cursor-pointer mobile-input">
                                </select>
                        </div>

                        <button onclick="initiatePayment()" id="payBtn" class="w-full py-4 md:py-5 bg-brand-blue text-white rounded-xl md:rounded-2xl text-xs md:text-sm font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-[0.98]">
                            Proceed to Refill
                        </button>
                    </div>
                </div>
            </div>

            <div id="receiptView" class="hidden animate-flow py-6">
                <div class="bg-white border-2 border-dashed border-brand-border rounded-2xl md:rounded-3xl p-6 md:p-8 max-w-md mx-auto shadow-2xl relative">
                    <div class="absolute -top-5 left-1/2 -translate-x-1/2 w-10 h-10 md:w-12 md:h-12 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg">
                        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    
                    <div class="text-center mt-3">
                        <h2 class="text-lg md:text-xl font-bold text-brand-darkText">Payment Receipt</h2>
                        <p class="text-[10px] text-brand-lightText">Ref ID: <span id="rID" class="font-mono">SG-882190</span></p>
                    </div>

                    <div class="my-6 space-y-3 border-t border-b border-brand-border py-6 font-mono text-[10px] md:text-xs">
                        <div class="flex justify-between"><span>Carrier:</span> <span id="rCarrier" class="font-bold">--</span></div>
                        <div class="flex justify-between"><span>Number:</span> <span id="rNumber" class="font-bold">--</span></div>
                        <div class="flex justify-between"><span>Amount:</span> <span id="rPlan" class="font-bold">--</span></div>
                        <div class="flex justify-between"><span>Status:</span> <span class="text-green-600 font-bold uppercase">Processing</span></div>
                    </div>

                    <button onclick="contactManagement()" class="w-full py-3.5 bg-[#25D366] text-white rounded-xl text-[11px] font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        Notify Admin on WhatsApp
                    </button>
                    <button onclick="location.reload()" class="w-full text-[9px] font-bold text-brand-lightText uppercase py-4">New Transaction</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const carriers = [
            { id: '1', name: 'T-Mobile USA', image: 'https://i.imgur.com/pyDMW1t.png' },
            { id: '2', name: 'AT&T', image: 'https://i.imgur.com/WDCo1gM.png' },
            { id: '3', name: 'Verizon', image: 'https://i.imgur.com/ylEL7gO.jpeg' },
            { id: '4', name: 'Vodafone UK', image: 'https://i.imgur.com/r7a0fpw.png' }
        ];

        // Generate Amounts $15 to $100
        const refillAmounts = [];
        for (let i = 15; i <= 100; i += 5) { refillAmounts.push(`$${i}.00`); }

        let selectedCarrier = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function initPage() {
            const grid = document.getElementById('carrierGrid');
            grid.innerHTML = carriers.map(c => `
                <div onclick="selectCarrier('${c.id}')" class="bg-white border border-brand-border p-4 md:p-6 rounded-2xl md:rounded-3xl cursor-pointer hover:shadow-xl transition-all group text-center">
                    <div class="h-12 md:h-16 mb-3 flex items-center justify-center grayscale group-hover:grayscale-0 transition-all">
                        <img src="${c.image}" class="max-h-full object-contain">
                    </div>
                    <h3 class="text-[10px] md:text-xs font-bold text-brand-darkText uppercase group-hover:text-brand-blue">${c.name}</h3>
                </div>
            `).join('');
            
            // Populate selector
            const selector = document.getElementById('planSelector');
            selector.innerHTML = refillAmounts.map(amt => `<option value="${amt}">${amt}</option>`).join('');
        }

        function selectCarrier(id) {
            selectedCarrier = carriers.find(c => c.id === id);
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('formView').classList.remove('hidden');
            document.getElementById('formCarrierName').innerText = selectedCarrier.name;
            document.getElementById('formCarrierLogo').src = selectedCarrier.image;
        }

        function goBackToGrid() {
            document.getElementById('selectionView').classList.remove('hidden');
            document.getElementById('formView').classList.add('hidden');
        }

      async function initiatePayment() {
    const num = document.getElementById('targetNumber').value;
    const plan = document.getElementById('planSelector').value; // e.g. "$15.00"

    if(!num) { 
        alert("Please enter the eSIM mobile number"); 
        return; 
    }

    const btn = document.getElementById('payBtn');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = "Generating Payment Link...";

    try {
        // We call your 'initiate-payment' action in the backend
        const response = await fetch('/api/main', { // Ensure this matches your API route
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}` // Assumes user is logged in
            },
            body: JSON.stringify({
                action: 'initiate-payment',
                carrierName: selectedCarrier.name, // e.g. "Verizon"
                mobileNumber: num,
                planAmount: plan, // e.g. "$15.00"
                productImage: selectedCarrier.image
            })
        });

        const data = await response.json();

        if(data.success && data.link) {
            // REDIRECT TO FLUTTERWAVE
            window.location.href = data.link; 
        } else {
            alert("Error: " + (data.message || "Could not initialize payment."));
            btn.disabled = false;
            btn.innerText = originalText;
        }
    } catch (err) {
        console.error(err);
        alert("Connection error. Please check your internet.");
        btn.disabled = false;
        btn.innerText = originalText;
    }
}

        function contactManagement() {
            const num = document.getElementById('rNumber').innerText;
            const carrier = document.getElementById('rCarrier').innerText;
            const plan = document.getElementById('rPlan').innerText;
            const tid = document.getElementById('rID').innerText;

            const msg = `*ESIM REFILL REQUEST*\n\nCarrier: ${carrier}\nNumber: ${num}\nAmount: ${plan}\nRef ID: ${tid}\n\nPlease confirm payment and initiate refill.`;
            const waUrl = `https://wa.me/2348149747864?text=${encodeURIComponent(msg)}`;
            window.open(waUrl, '_blank');
        }

        // Add this helper function
function getNairaPrice(usdString) {
    const rate = 1650;
    const usd = parseFloat(usdString.replace(/[$,]/g, ''));
    return `₦${(usd * rate).toLocaleString()}`;
}

// Update your planSelector listener
document.getElementById('planSelector').addEventListener('change', function() {
    const nairaDisplay = getNairaPrice(this.value);
    document.getElementById('payBtn').innerText = `Pay ${nairaDisplay} (Refill)`;
});

        window.onload = initPage;
    </script>
</body>
</html>
