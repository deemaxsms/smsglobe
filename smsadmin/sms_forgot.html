<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin Password - SMSGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-brand-background min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-[400px]">
        <div class="flex flex-col items-center mb-8">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="h-10 mb-4">
            <h1 class="text-2xl font-bold text-brand-darkText">Set New Password</h1>
            <p class="text-sm text-brand-lightText mt-2 text-center">Enter a strong, secure password for your admin account.</p>
        </div>

        <div class="bg-white p-8 rounded-[24px] border border-brand-border shadow-xl">
            <form id="resetConfirmForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-brand-midText uppercase mb-1.5 ml-1">New Password</label>
                    <input type="password" id="newPassword" required minlength="8"
                        class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-50 focus:border-brand-blue outline-none transition-all font-medium"
                        placeholder="Min. 8 characters">
                </div>

                <div>
                    <label class="block text-xs font-bold text-brand-midText uppercase mb-1.5 ml-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" required
                        class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-50 focus:border-brand-blue outline-none transition-all font-medium"
                        placeholder="Repeat new password">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-brand-darkText text-white py-4 rounded-xl text-sm font-bold hover:bg-black transition-all shadow-lg active:scale-[0.98]">
                    Reset Admin Password
                </button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Invalid or missing reset token.");
            window.location.href = 'sms_login.html';
        }

        document.getElementById('resetConfirmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Updating Password...";

            try {
                const response = await fetch('/api/admin-reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Password updated! You can now login.");
                    window.location.href = 'sms_login.html';
                } else {
                    alert("Error: " + data.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Admin Password";
                }
            } catch (err) {
                alert("Connection failed.");
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
