<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-60 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-4 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-5 w-auto">
            <button id="closeSidebar" class="lg:hidden text-gray-400 text-2xl">&times;</button>
        </div>
        <nav class="flex-grow p-3 space-y-0.5 overflow-y-auto no-scrollbar">
            <p class="px-3 text-[9px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="user_dashboard.html" class="flex items-center space-x-2 px-3 py-1.5 text-brand-midText hover:bg-gray-50 rounded-lg text-[11px] font-medium">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="user_profile.html" class="flex items-center space-x-2 px-3 py-1.5 bg-brand-background text-brand-blue rounded-lg text-[11px] font-semibold">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span>My Profile</span>
            </a>
            </nav>
        <div class="p-3 border-t border-brand-border">
            <button onclick="logout()" class="flex items-center space-x-2 w-full px-3 py-2 text-red-500 hover:bg-red-50 rounded-lg text-[11px] font-bold transition-all">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span>Log Out</span>
            </button>
        </div>
    </aside>

    <div class="flex-grow lg:ml-60 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 py-2.5 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <button id="openSidebar" class="lg:hidden p-1 text-brand-midText border border-brand-border rounded">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="text-xs font-bold text-brand-darkText">Account Settings</span>
            </div>
        </header>

        <main class="p-4 md:p-8 max-w-4xl w-full mx-auto space-y-6">
            
            <div class="bg-white rounded-2xl border border-brand-border p-6 shadow-sm flex flex-col md:flex-row items-center gap-6">
                <div class="relative">
                    <div class="w-20 h-20 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-2xl font-black border-2 border-brand-blue/20">
                        <span id="pfpInitials">U</span>
                    </div>
                    <div class="absolute bottom-0 right-0 w-6 h-6 bg-green-500 border-4 border-white rounded-full"></div>
                </div>
                <div class="text-center md:text-left flex-grow">
                    <h2 id="displayFullName" class="text-lg font-extrabold text-brand-darkText uppercase tracking-tight">Loading...</h2>
                    <p id="displayEmail" class="text-xs text-brand-lightText">...</p>
                    <div class="mt-2 flex flex-wrap justify-center md:justify-start gap-2">
                        <span class="bg-brand-background text-brand-blue text-[9px] font-bold px-2 py-1 rounded-full border border-brand-blue/10 uppercase">Active Member</span>
                        <span id="joinDate" class="bg-gray-100 text-brand-lightText text-[9px] font-bold px-2 py-1 rounded-full border border-brand-border uppercase tracking-tighter">Joined March 2026</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 space-y-6">
                    <section class="bg-white rounded-2xl border border-brand-border overflow-hidden shadow-sm">
                        <div class="p-4 border-b border-brand-border bg-gray-50/50">
                            <h3 class="text-[10px] font-bold text-brand-darkText uppercase tracking-wider">Personal Information</h3>
                        </div>
                        <div class="p-5 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-brand-lightText uppercase">Full Name</label>
                                    <input type="text" id="inputName" readonly class="w-full bg-gray-50 border border-brand-border rounded-lg px-3 py-2 text-[11px] font-medium text-brand-darkText focus:outline-none focus:ring-1 focus:ring-brand-blue">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-brand-lightText uppercase">Email Address</label>
                                    <input type="email" id="inputEmail" readonly class="w-full bg-gray-50 border border-brand-border rounded-lg px-3 py-2 text-[11px] font-medium text-brand-darkText focus:outline-none">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-brand-lightText uppercase">Account ID</label>
                                    <input type="text" id="inputID" readonly class="w-full bg-gray-50 border border-brand-border rounded-lg px-3 py-2 text-[10px] font-mono text-brand-lightText focus:outline-none">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold text-brand-lightText uppercase">Security Status</label>
                                    <div class="flex items-center px-3 py-2 bg-green-50 text-green-700 rounded-lg text-[10px] font-bold border border-green-100">
                                        <svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                                        Verified Account
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white rounded-2xl border border-brand-border overflow-hidden shadow-sm">
                        <div class="p-4 border-b border-brand-border bg-gray-50/50">
                            <h3 class="text-[10px] font-bold text-brand-darkText uppercase tracking-wider">Account Actions</h3>
                        </div>
                        <div class="p-5 flex gap-3">
                            <button class="bg-brand-blue text-white text-[10px] font-bold px-4 py-2 rounded-lg active-scale transition-all shadow-md">Update Profile</button>
                            <button onclick="logout()" class="bg-red-50 text-red-600 border border-red-100 text-[10px] font-bold px-4 py-2 rounded-lg active-scale transition-all">Sign Out Everywhere</button>
                        </div>
                    </section>
                </div>

                <div class="space-y-4">
                    <div class="bg-brand-blue rounded-2xl p-5 text-white shadow-lg relative overflow-hidden group">
                        <div class="relative z-10">
                            <h4 class="text-xs font-bold mb-1">Need help?</h4>
                            <p class="text-[10px] text-blue-100 mb-4 opacity-80">Our support team is available 24/7 for account queries.</p>
                            <button onclick="window.open('https://wa.me/7059450227')" class="w-full bg-white text-brand-blue py-2 rounded-xl text-[10px] font-black active-scale shadow-sm">CONTACT SUPPORT</button>
                        </div>
                        <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform">
                            <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"></path></svg>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border border-brand-border p-5 shadow-sm">
                        <h4 class="text-[10px] font-extrabold text-brand-darkText uppercase tracking-widest mb-4">Activity Insights</h4>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-[9px] font-bold mb-1 uppercase">
                                    <span class="text-brand-lightText">Total Orders</span>
                                    <span class="text-brand-blue">24</span>
                                </div>
                                <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                    <div class="bg-brand-blue h-full w-[65%]"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] font-bold mb-1 uppercase">
                                    <span class="text-brand-lightText">Wallet Status</span>
                                    <span class="text-green-500">Active</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = '/api';

        async function initProfile() {
            const token = localStorage.getItem('userToken');
            if (!token) { window.location.href = 'user_login.html'; return; }

            try {
                const profileRes = await fetch(`${API_BASE_URL}/user-profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const userData = await profileRes.json();

                // Mapping to your specific DB structure
                const name = userData.fullName || "Tobi Scoop";
                const email = userData.email || "filadron17@gmail.com";
                const id = userData._id || "69c7e173e77866571e9f25ba";
                
                // Displaying Data
                document.getElementById('displayFullName').innerText = name;
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('pfpInitials').innerText = name.charAt(0).toUpperCase();
                
                // Form Fields
                document.getElementById('inputName').value = name;
                document.getElementById('inputEmail').value = email;
                document.getElementById('inputID').value = id;

                // Handle Date Formatting if available
                if(userData.createdAt) {
                    const date = new Date(userData.createdAt);
                    document.getElementById('joinDate').innerText = `Joined ${date.toLocaleString('default', { month: 'long' })} ${date.getFullYear()}`;
                }

            } catch (err) {
                console.error("Profile load error:", err);
            }
        }

        function logout() {
            localStorage.removeItem('userToken');
            window.location.href = 'user_login.html';
        }

        // Sidebar Toggles
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleSidebar = () => { sidebar.classList.toggle('-translate-x-full'); overlay.classList.toggle('hidden'); };
        document.getElementById('openSidebar').addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar').addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        window.onload = initProfile;
    </script>
</body>
</html>
