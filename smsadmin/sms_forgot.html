<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Forgot Password</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; }
        .logo-img { height: 36px; width: auto; object-fit: contain; }
        @media (min-width: 768px) { .logo-img { height: 44px; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans">

    <div class="w-full max-w-[400px]">
        <div class="flex flex-col items-center mb-6 sm:mb-8">
            <a href="/">
                <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe Logo" class="logo-img mb-3 sm:mb-4">
            </a>
            <div class="bg-blue-100 p-3 rounded-full mb-4">
                <svg class="w-6 h-6 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold text-brand-darkText">Forgot Password?</h1>
            <p id="instructionText" class="text-[13px] sm:text-sm text-brand-lightText mt-1 sm:mt-2 text-center px-4">No worries, we'll send you reset instructions.</p>
        </div>

        <div class="bg-white p-6 sm:p-8 rounded-[20px] sm:rounded-[24px] border border-brand-border shadow-xl shadow-blue-100/50">
            <form id="forgotForm" class="space-y-4 sm:space-y-5">
                <div>
                    <label class="block text-[12px] sm:text-sm font-semibold text-brand-darkText mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" 
                        class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-brand-border focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all placeholder:text-brand-lightText/60 text-[13px] sm:text-sm" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-3 sm:py-3.5 rounded-xl text-[14px] sm:text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                    Reset Password
                </button>
            </form>

            <div id="successMessage" class="hidden text-center py-4">
                <p class="text-green-600 font-semibold text-sm">Instructions sent! Check your inbox.</p>
            </div>

            <div class="mt-6 sm:mt-8 text-center">
                <a href="sms_login.html" class="inline-flex items-center gap-2 text-[12px] sm:text-sm text-brand-lightText font-bold hover:text-brand-blue transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to log in
                </a>
            </div>
        </div>
    </div>

    <script>
        const forgotForm = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMessage');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    forgotForm.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                } else {
                    alert(data.message || "Something went wrong.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Password";
                }
            } catch (error) {
                console.error('Forgot Password Error:', error);
                alert('Server connection error.');
                submitBtn.disabled = false;
                submitBtn.innerText = "Reset Password";
            }
        });
    </script>
</body>
</html>
