<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Security - SMSGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F9FAFB', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-brand-background min-h-screen flex flex-col font-sans">

    <nav class="p-4 md:p-6 border-b bg-white">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-bold text-brand-blue uppercase tracking-widest text-sm">Admin Control Panel</span>
            <a href="/admin/dashboard" class="text-xs font-bold text-brand-midText hover:text-brand-blue transition-colors">Return to Dashboard</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-[440px]">
            <div class="bg-white rounded-3xl border border-brand-border shadow-2xl p-8 md:p-10">
                
                <div class="mb-8">
                    <h1 class="text-2xl font-black text-brand-darkText mb-2">Update Admin Password</h1>
                    <p class="text-brand-lightText text-sm">Ensure your account remains secure with a strong password.</p>
                </div>

                <form id="adminPassForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-brand-midText uppercase mb-1.5 ml-1">Current Admin Password</label>
                        <input type="password" id="oldPassword" required
                            class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-50 focus:border-brand-blue outline-none transition-all font-medium"
                            placeholder="••••••••">
                    </div>

                    <div class="pt-2">
                        <label class="block text-xs font-bold text-brand-midText uppercase mb-1.5 ml-1">New Password</label>
                        <input type="password" id="newPassword" required minlength="8"
                            class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-50 focus:border-brand-blue outline-none transition-all font-medium"
                            placeholder="Min. 8 characters">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-brand-midText uppercase mb-1.5 ml-1">Confirm New Password</label>
                        <input type="password" id="confirmPassword" required
                            class="w-full px-4 py-3 rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-50 focus:border-brand-blue outline-none transition-all font-medium"
                            placeholder="Repeat new password">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-darkText text-white py-4 rounded-xl text-sm font-bold hover:bg-black transition-all shadow-lg active:scale-[0.98]">
                        Confirm Changes
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('adminPassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const token = localStorage.getItem('smsglobe_admin_token');

            if (newPassword !== confirmPassword) {
                alert("New passwords do not match!");
                return;
            }

            if (!token) {
                alert("Admin session expired.");
                window.location.href = '/admin/login';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Security Update...";

            try {
                const response = await fetch('/api/change-passwords', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    // Matching your backend keys: oldPassword and newPassword
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Admin password updated successfully!");
                    window.location.href = '/admin/dashboard';
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                console.error(err);
                alert("Failed to connect to security server.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Confirm Changes";
            }
        });
    </script>
</body>
</html>
