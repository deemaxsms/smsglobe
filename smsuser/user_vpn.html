<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Services | SMSGlobe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText">

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
        </div>
       <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 bg-brand-background text-brand-blue rounded-lg text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="buy-number.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span>Buy Virtual Number</span>
            </a>
            <a href="esims.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span>Travel eSIMs</span>
            </a>
             <a href="user_vpn.html" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span>VPNs</span>
            </a>
        </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 md:px-8 py-4 flex items-center justify-between">
            <span class="text-sm font-bold text-brand-darkText uppercase tracking-tight">Premium VPN Nodes</span>
            </header>

        <main class="p-4 md:p-6 max-w-6xl w-full mx-auto">
            <div id="vpnLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="h-80 bg-gray-200 animate-pulse rounded-2xl"></div>
                <div class="h-80 bg-gray-200 animate-pulse rounded-2xl"></div>
                <div class="h-80 bg-gray-200 animate-pulse rounded-2xl"></div>
            </div>

            <div id="vpnGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="vpnModal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl animate-in zoom-in duration-200">
            <h2 id="modalTitle" class="text-lg font-bold text-brand-darkText mb-2">Node Activated!</h2>
            <div id="modalContent" class="space-y-4">
                <div class="bg-brand-background p-3 rounded-lg border border-brand-blue/10">
                    <p class="text-[10px] font-bold text-brand-blue uppercase">Connection Instructions</p>
                    <p id="modalInstructions" class="text-xs mt-1 text-brand-midText leading-relaxed"></p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="border border-brand-border p-3 rounded-lg bg-gray-50/50">
                        <p class="text-[10px] font-bold text-brand-lightText uppercase">Username</p>
                        <p id="modalUser" class="text-xs font-mono font-bold text-brand-blue break-all"></p>
                    </div>
                    <div class="border border-brand-border p-3 rounded-lg bg-gray-50/50">
                        <p class="text-[10px] font-bold text-brand-lightText uppercase">Security Key</p>
                        <p id="modalPass" class="text-xs font-mono font-bold text-brand-darkText">********</p>
                    </div>
                </div>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 py-3 bg-brand-blue text-white rounded-xl text-xs font-bold shadow-lg hover:bg-blue-700 transition-all active:scale-95">Done</button>
        </div>
    </div>

<script>
    const API_BASE_URL = '/api';

    async function initVPNPage() {
        const token = localStorage.getItem('userToken');
        if (!token) { window.location.href = 'user_login.html'; return; }

        // Check if we are returning from a successful payment
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const tx_ref = urlParams.get('tx_ref');
        const transaction_id = urlParams.get('transaction_id');

        if (status === 'successful' || status === 'completed') {
            verifyPayment(transaction_id, tx_ref);
        }

        try {
            const vpnRes = await fetch(`${API_BASE_URL}/products`);
            const data = await vpnRes.json();
            if (data.success) { renderVPNs(data.products); }
        } catch (err) { console.error("Initialization Error:", err); }
    }

    async function buyVPN(vpnId) {
        const planIndex = document.getElementById(`plan-${vpnId}`).value;
        const token = localStorage.getItem('userToken');
        const buyBtn = document.getElementById(`btn-${vpnId}`);

        buyBtn.disabled = true;
        buyBtn.innerText = "Redirecting to Payment...";

        try {
            // This endpoint should create a Flutterwave payment link
            const res = await fetch(`${API_BASE_URL}/initiate-payment`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ vpnId, planIndex })
            });

            const data = await res.json();

            if (data.success && data.link) {
                // Redirect user to Flutterwave Checkout
                window.location.href = data.link;
            } else {
                alert(data.message || "Failed to initiate payment.");
                buyBtn.disabled = false;
                buyBtn.innerText = "Purchase Access";
            }
        } catch (err) {
            alert("Payment system unreachable.");
            buyBtn.disabled = false;
            buyBtn.innerText = "Purchase Access";
        }
    }

    async function verifyPayment(transactionId, txRef) {
        const token = localStorage.getItem('userToken');
        // Show a loading state or modal while verifying
        document.getElementById('modalTitle').innerText = "Verifying Payment...";
        document.getElementById('modalInstructions').innerText = "Please wait while we confirm your transaction and provision your node.";
        document.getElementById('vpnModal').classList.remove('hidden');

        try {
            const res = await fetch(`${API_BASE_URL}/verify-payment`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ transactionId, txRef })
            });

            const data = await res.json();

            if (data.success) {
                // Success! Fill the modal with real credentials
                document.getElementById('modalTitle').innerText = "Node Activated! ✅";
                document.getElementById('modalInstructions').innerText = data.credentials.instructions;
                document.getElementById('modalUser').innerText = data.credentials.username;
                document.getElementById('modalPass').innerText = data.credentials.password;
                
                // Remove the URL params so refreshing doesn't trigger verification again
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                alert("Payment verification failed: " + data.message);
                closeModal();
            }
        } catch (err) {
            alert("Error verifying payment.");
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('vpnModal').classList.add('hidden');
        // Clean the URL if user closes modal after successful payment
        window.location.href = 'user_vpn.html';
    }

    function renderVPNs(vpns) {
        const grid = document.getElementById('vpnGrid');
        const loader = document.getElementById('vpnLoading');
        loader.classList.add('hidden');
        grid.classList.remove('hidden');

        grid.innerHTML = vpns.map(vpn => {
            const isOutOfStock = vpn.stock <= 0;
            const stockColor = isOutOfStock ? 'text-red-500 bg-red-50' : 'text-green-600 bg-green-50';
            
            return `
            <div class="bg-white border border-brand-border rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col overflow-hidden max-w-sm mx-auto w-full">
                <div class="h-24 md:h-28 bg-gray-100 relative overflow-hidden border-b border-brand-border/50">
                    <img src="${vpn.image || 'https://via.placeholder.com/400x200?text=Premium+Node'}" class="w-full h-full object-cover">
                    <div class="absolute top-2 left-2 flex gap-2">
                         <span class="text-[9px] font-bold px-2 py-0.5 bg-white/90 backdrop-blur shadow-sm text-brand-blue rounded-md uppercase border border-brand-blue/10">${vpn.region || 'Global'}</span>
                    </div>
                    <div class="absolute top-2 right-2">
                         <span class="text-[9px] font-bold px-2 py-0.5 ${stockColor} rounded-md uppercase shadow-sm border border-current/10">
                            ${isOutOfStock ? 'Out of Stock' : `${vpn.stock} in Stock`}
                         </span>
                    </div>
                </div>

                <div class="p-4 flex flex-col flex-grow">
                    <div class="mb-3">
                        <h3 class="font-bold text-brand-darkText text-xs mb-0.5">${vpn.name}</h3>
                        <p class="text-[9px] text-brand-lightText font-medium">${vpn.provider || 'SMSGlobe'}</p>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg p-2.5 mb-4 border border-gray-100">
                        <label class="text-[8px] font-bold text-brand-lightText uppercase block mb-1.5">Select Access Tier</label>
                        <select id="plan-${vpn._id}" class="w-full bg-white border border-brand-border rounded-md px-2 py-1.5 text-[11px] font-bold focus:outline-none focus:ring-1 focus:ring-brand-blue cursor-pointer">
                            ${vpn.plans.map((p, i) => `<option value="${i}">${p.duration} — $${parseFloat(p.price).toFixed(2)}</option>`).join('')}
                        </select>
                    </div>

                    <button onclick="buyVPN('${vpn._id}')" id="btn-${vpn._id}" ${isOutOfStock ? 'disabled' : ''}
                            class="mt-auto w-full py-2.5 ${isOutOfStock ? 'bg-gray-300' : 'bg-brand-blue hover:bg-blue-700'} text-white text-[10px] font-bold rounded-lg shadow-sm active:scale-95 transition-all">
                        ${isOutOfStock ? 'Currently Unavailable' : 'Purchase Access'}
                    </button>
                </div>
            </div>
        `;}).join('');
    }

    window.onload = initVPNPage;
</script>
</body>
</html>
