<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - VPN Management</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 13px; }
        @media (min-width: 1024px) { body { font-size: 14px; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EAECF0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[70] hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[80] w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-20 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="sms_users.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            Users
                        </a>
                        <a href="sms_vpn.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            VPN Nodes
                        </a>
                        <a href="sms_proxy.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                           Proxy Nodes
                        </a>
                         <a href="transaction_history.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Transaction History
                        </a>
                    </nav>
                </div>
                <div class="p-5 border-t border-brand-border bg-gray-50/50">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold tracking-tight">VPN Inventory</h2>
                    <p class="text-brand-lightText text-xs md:text-sm">Manage global VPN nodes and access</p>
                </div>
                <button onclick="openAddVPNModal()" class="bg-brand-blue text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <span class="text-lg leading-none">+</span> Add VPN Node
                </button>
            </header>

            <div class="bg-white rounded-2xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 border-b border-brand-border">
                            <tr>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">VPN Server Detail</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Provider</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText text-center">In Stock</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText">Pricing Tiers</th>
                                <th class="px-6 py-4 text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-brand-lightText text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vpn-list" class="divide-y divide-brand-border"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="vpnModal" class="fixed inset-0 bg-black/50 z-[90] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-brand-border flex justify-between items-center bg-white sticky top-0 z-10">
                <h3 id="modalTitle" class="text-lg font-bold">New VPN Configuration</h3>
                <button onclick="closeModal()" class="text-brand-lightText hover:text-red-500 transition-colors p-1">✕</button>
            </div>
            
            <form id="vpnForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5 overflow-y-auto custom-scrollbar">
                <input type="hidden" id="vpnId" name="vpnId">
                
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">VPN Location/Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. USA Premium Node" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-1">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">VPN Provider</label>
                    <input type="text" id="provider" name="provider" required placeholder="NordVPN" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-1">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Region</label>
                    <input type="text" id="region" name="region" required placeholder="United States" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-1">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Available in Stock</label>
                    <input type="number" id="stock" name="stock" required placeholder="0" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-1">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Max Concurrent Devices</label>
                    <input type="number" id="deviceLimit" name="deviceLimit" placeholder="e.g. 5" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Server Flag/Image URL</label>
                    <input type="text" id="image" name="image" placeholder="https://imgur.com/..." class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all" oninput="previewImage(this.value)">
                    <div id="imgPreviewContainer" class="mt-3 hidden">
                        <img id="imgPreview" src="" class="h-16 w-16 object-cover rounded-xl border border-brand-border shadow-sm">
                    </div>
                </div>

                <div class="md:col-span-2 bg-gray-50 p-4 rounded-2xl border border-brand-border">
                    <label class="block text-[10px] font-bold text-brand-midText mb-3 uppercase tracking-widest">Pricing Plans (Duration & Price)</label>
                    <div id="pricingContainer" class="space-y-3"></div>
                    <button type="button" onclick="addPriceRow()" class="mt-4 text-brand-blue font-bold text-[11px] uppercase flex items-center gap-1 hover:text-blue-700">
                        <span class="text-base">+</span> Add Plan Option
                    </button>
                </div>

                <div class="md:col-span-2 bg-brand-background p-5 rounded-2xl border border-blue-100">
                    <p class="font-bold text-brand-blue mb-4 text-[10px] uppercase tracking-widest flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        Server Access Credentials
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="username" name="username" placeholder="VPN Account ID" class="w-full bg-white border border-brand-border p-2.5 rounded-lg text-sm">
                        <input type="text" id="password" name="password" placeholder="Key / Passphrase" class="w-full bg-white border border-brand-border p-2.5 rounded-lg text-sm">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Connection Instructions</label>
                    <textarea id="instructions" name="instructions" rows="2" placeholder="Step-by-step instructions..." class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all text-sm"></textarea>
                </div>

                <div class="md:col-span-2 pt-2 sticky bottom-0 bg-white">
                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-[0.98]">
                        Sync VPN Data
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    let allVPNs = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    function addPriceRow(duration = '', price = '') {
        const container = document.getElementById('pricingContainer');
        const row = document.createElement('div');
        row.className = 'pricing-row flex gap-2 items-center animate-in fade-in duration-300';
        row.innerHTML = `
            <input type="text" placeholder="e.g. 1 Month" value="${duration}" class="plan-duration flex-1 bg-white border border-brand-border p-2.5 rounded-lg text-sm focus:border-brand-blue outline-none">
            <div class="relative w-32">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-brand-lightText">$</span>
                <input type="number" step="0.01" placeholder="0.00" value="${price}" class="plan-price w-full bg-white border border-brand-border pl-7 pr-3 py-2.5 rounded-lg text-sm focus:border-brand-blue outline-none">
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="p-2 text-red-400 hover:text-red-600 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            </button>
        `;
        container.appendChild(row);
    }

    async function fetchVPNs() {
        const token = localStorage.getItem('smsglobe_admin_token');
        const list = document.getElementById('vpn-list');
        
        try {
            const res = await fetch('/api/products', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            allVPNs = data.products || [];
            
            if (allVPNs.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="p-12 text-center text-brand-lightText italic text-xs">No VPN nodes found.</td></tr>';
                return;
            }

            list.innerHTML = allVPNs.map(v => {
                const plans = v.plans || [];
                const planDisplay = plans.length > 0 
                    ? `<span class="text-brand-blue font-bold">${plans[0].duration} - $${parseFloat(plans[0].price).toFixed(2)}</span> ${plans.length > 1 ? `<span class="text-[10px] text-brand-lightText block">+ ${plans.length - 1} more tiers</span>` : ''}`
                    : '<span class="text-gray-400">Not set</span>';

                const stockCount = v.stock !== undefined ? v.stock : 0;
                const stockColor = stockCount > 5 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';

                return `
                    <tr class="hover:bg-brand-background/30 transition-colors">
                        <td class="px-6 py-5">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl bg-gray-50 border border-brand-border overflow-hidden flex-shrink-0">
                                    <img src="${v.image || 'https://via.placeholder.com/40'}" class="w-full h-full object-cover">
                                </div>
                                <div class="min-w-0">
                                    <div class="font-bold text-brand-darkText truncate max-w-[150px]">${v.name}</div>
                                    <div class="text-[11px] text-brand-lightText">${v.deviceLimit || 0} Device Limit</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-sm font-medium whitespace-nowrap">${v.provider}</div>
                            <div class="text-[10px] text-brand-orange font-bold uppercase tracking-wider">${v.region}</div>
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="px-2.5 py-1 rounded-full font-bold text-xs ${stockColor}">
                                ${stockCount}
                            </span>
                        </td>
                        <td class="px-6 py-5 whitespace-nowrap">${planDisplay}</td>
                        <td class="px-6 py-5 text-right">
                            <div class="flex justify-end gap-3">
                                <button onclick="editVPN('${v._id}')" class="text-brand-blue hover:text-blue-800 font-bold text-[10px] uppercase">Edit</button>
                                <button onclick="deleteVPN('${v._id}')" class="text-red-500 hover:text-red-700 font-bold text-[10px] uppercase">Del</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (err) {
            list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500">Connection error.</td></tr>';
        }
    }

    function previewImage(url) {
        const container = document.getElementById('imgPreviewContainer');
        const img = document.getElementById('imgPreview');
        if (url && url.startsWith('http')) {
            img.src = url;
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
    }

    function openAddVPNModal() {
        document.getElementById('vpnForm').reset();
        document.getElementById('vpnId').value = '';
        document.getElementById('pricingContainer').innerHTML = '';
        addPriceRow();
        document.getElementById('imgPreviewContainer').classList.add('hidden');
        document.getElementById('modalTitle').innerText = 'New VPN Configuration';
        document.getElementById('submitBtn').innerText = 'Sync VPN Data';
        document.getElementById('vpnModal').classList.remove('hidden');
    }

    function editVPN(id) {
        const v = allVPNs.find(item => item._id === id);
        if (!v) return;

        document.getElementById('vpnId').value = v._id;
        document.getElementById('name').value = v.name;
        document.getElementById('image').value = v.image || '';
        document.getElementById('provider').value = v.provider;
        document.getElementById('region').value = v.region;
        document.getElementById('stock').value = v.stock || 0; // Populate Stock
        document.getElementById('deviceLimit').value = v.deviceLimit || '';
        document.getElementById('username').value = v.username || '';
        document.getElementById('password').value = v.password || '';
        document.getElementById('instructions').value = v.instructions || '';

        const container = document.getElementById('pricingContainer');
        container.innerHTML = '';
        if (v.plans && v.plans.length > 0) {
            v.plans.forEach(p => addPriceRow(p.duration, p.price));
        } else {
            addPriceRow();
        }

        if (v.image) previewImage(v.image);
        document.getElementById('modalTitle').innerText = 'Update VPN Node';
        document.getElementById('submitBtn').innerText = 'Save Changes';
        document.getElementById('vpnModal').classList.remove('hidden');
    }

    async function deleteVPN(id) {
        if (!confirm('Permanently delete this VPN node?')) return;
        const token = localStorage.getItem('smsglobe_admin_token');
        try {
            const res = await fetch(`/api/products?id=${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) fetchVPNs();
        } catch (e) {
            alert('Delete failed.');
        }
    }

    function closeModal() {
        document.getElementById('vpnModal').classList.add('hidden');
    }

    document.getElementById('vpnForm').onsubmit = async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('smsglobe_admin_token');
        const id = document.getElementById('vpnId').value;
        
        const formData = new FormData(e.target);
        const vpnData = Object.fromEntries(formData.entries());

        // Dynamic pricing plans
        const planRows = document.querySelectorAll('.pricing-row');
        vpnData.plans = Array.from(planRows).map(row => ({
            duration: row.querySelector('.plan-duration').value,
            price: row.querySelector('.plan-price').value
        })).filter(p => p.duration && p.price);

        const method = id ? 'PATCH' : 'POST';
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        try {
            const res = await fetch('/api/products', {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(vpnData)
            });

            if (res.ok) {
                closeModal();
                fetchVPNs();
            } else {
                alert('Sync failed.');
            }
        } catch (e) {
            alert('Network error.');
        } finally {
            btn.disabled = false;
            btn.innerText = id ? 'Save Changes' : 'Sync VPN Data';
        }
    };

    function logout() {
        localStorage.removeItem('smsglobe_admin_token');
        window.location.href = 'sms_login.html';
    }

    window.onload = fetchVPNs;
</script>
</body>
</html>
