<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - Transaction History</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                            darkText: '#101828',
                            lightText: '#667085'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-brand-background min-h-screen text-brand-darkText">

    <div class="flex flex-col lg:flex-row">
        <aside class="w-full lg:w-64 bg-white border-r border-brand-border min-h-screen p-5">
            <div class="mb-10">
                <img src="https://imgur.com/8YeZgfx.png" alt="Logo" class="h-8">
            </div>
            <nav class="space-y-2">
                <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="transaction_history.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                    Transaction History
                </a>
                <a href="sms_users.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Users
                </a>
                <a href="sms_vpn.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    VPN
                </a>
                <a href="sms_proxy.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    Proxy Nodes
                </a>
                <a href="esims_refill.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            eSim Refill
                        </a>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 max-w-7xl mx-auto w-full">
            <header class="mb-8">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight text-brand-darkText">Transaction Ledger</h2>
                        <p class="text-brand-lightText text-sm">Managing revenue across USD and Naira settlements</p>
                    </div>
                    
                    <div class="relative group">
                        <input type="text" id="txnSearch" onkeyup="applyAllFilters()" placeholder="Search email, product or currency..." 
                               class="pl-10 pr-4 py-2.5 border border-brand-border rounded-xl w-full md:w-80 focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none transition-all shadow-sm bg-white text-sm">
                        <svg class="w-5 h-5 absolute left-3 top-2.5 text-brand-lightText group-focus-within:text-brand-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>

                <div class="mt-6 flex flex-wrap items-center gap-4 bg-white p-4 rounded-2xl border border-brand-border shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-brand-lightText uppercase tracking-wider">From:</span>
                        <input type="date" id="startDate" onchange="applyAllFilters()" 
                               class="px-3 py-1.5 border border-brand-border rounded-lg text-sm focus:ring-2 focus:ring-brand-blue outline-none">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-brand-lightText uppercase tracking-wider">To:</span>
                        <input type="date" id="endDate" onchange="applyAllFilters()" 
                               class="px-3 py-1.5 border border-brand-border rounded-lg text-sm focus:ring-2 focus:ring-brand-blue outline-none">
                    </div>
                    <button onclick="resetFilters()" class="ml-auto text-xs font-medium text-brand-blue hover:underline">Clear Filters</button>
                </div>
            </header>

            <div class="bg-white rounded-2xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm" id="txnTable">
                        <thead class="bg-gray-50 border-b border-brand-border text-brand-lightText uppercase text-[11px] font-bold tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Timestamp</th>
                                <th class="px-6 py-4">Customer</th>
                                <th class="px-6 py-4">Product Info</th>
                                <th class="px-6 py-4 text-right">Settlement</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100" id="txnBody">
                            <tr>
                                <td colspan="4" class="p-20 text-center">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-8 h-8 border-4 border-brand-blue border-t-transparent rounded-full animate-spin"></div>
                                        <p class="text-brand-lightText animate-pulse italic">Retrieving secure transaction records...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

<script>
    let allTxns = [];

    async function fetchTransactions() {
        const token = localStorage.getItem('smsglobe_admin_token');
        const tbody = document.getElementById('txnBody');

        // Show a loading state while fetching
        tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-brand-lightText">
            <div class="flex flex-col items-center gap-3">
                <div class="w-8 h-8 border-4 border-brand-blue border-t-transparent rounded-full animate-spin"></div>
                <p>Retrieving secure transaction records...</p>
            </div>
        </td></tr>`;

        try {
            const res = await fetch('/api/transactions', {
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            const data = await res.json();

            if (data.success) {
                allTxns = data.transactions;
                renderTable(allTxns);
            } else {
                throw new Error(data.error || "Failed to fetch");
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-500 font-bold">Error loading history: ${err.message}</td></tr>`;
        }
    }

    function renderTable(txns) {
        const tbody = document.getElementById('txnBody');
        if (txns.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center italic text-brand-lightText">No transactions found for this selection.</td></tr>`;
            return;
        }

        tbody.innerHTML = txns.map(t => {
            const currency = (t.currency || 'USD').toUpperCase();
            const isNaira = currency === 'NGN' || currency === 'NAIRA';
            const symbol = isNaira ? '₦' : '$';
            const formattedAmount = parseFloat(t.amount || 0).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            return `
                <tr class="hover:bg-brand-background/40 transition-colors group">
                    <td class="px-6 py-4">
                        <div class="font-semibold text-brand-darkText">${new Date(t.date).toLocaleDateString()}</div>
                        <div class="text-[10px] text-brand-lightText uppercase tracking-tight">${new Date(t.date).toLocaleTimeString()}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-brand-darkText capitalize">${t.customerName || 'Unknown User'}</div>
                        <div class="text-[11px] text-brand-lightText truncate max-w-[180px]">${t.email}</div>
                        <div class="text-[9px] font-bold text-brand-blue/60 uppercase mt-1">Ref: ${t.id.slice(-8)}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase bg-brand-background text-brand-blue mb-1">
                            ${t.product}
                        </span>
                        <div class="text-brand-lightText text-[11px] leading-tight">${t.details}</div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="text-sm font-bold ${isNaira ? 'text-green-600' : 'text-brand-darkText'}">
                            ${symbol}${formattedAmount}
                        </div>
                        <div class="text-[9px] font-bold text-brand-lightText opacity-60">${currency}</div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function applyAllFilters() {
        const searchQuery = document.getElementById('txnSearch').value.toLowerCase();
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;

        const filtered = allTxns.filter(t => {
            // 1. Text Search Filter (Now including customerName)
            const matchesSearch = 
                (t.customerName && t.customerName.toLowerCase().includes(searchQuery)) || 
                t.email.toLowerCase().includes(searchQuery) || 
                t.product.toLowerCase().includes(searchQuery) ||
                (t.currency && t.currency.toLowerCase().includes(searchQuery));

            // 2. Date Range Filter
            const txnDate = new Date(t.date).setHours(0,0,0,0);
            let matchesDate = true;

            if (startVal) {
                const start = new Date(startVal).setHours(0,0,0,0);
                if (txnDate < start) matchesDate = false;
            }
            if (endVal) {
                const end = new Date(endVal).setHours(0,0,0,0);
                if (txnDate > end) matchesDate = false;
            }

            return matchesSearch && matchesDate;
        });

        renderTable(filtered);
    }

    function resetFilters() {
        document.getElementById('txnSearch').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        renderTable(allTxns);
    }

    window.onload = fetchTransactions;
</script>
</body>
</html>
