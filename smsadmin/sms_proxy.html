<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - 9Proxy Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 13px; }
        @media (min-width: 1024px) { body { font-size: 14px; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #EAECF0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-[70] hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[80] w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-20 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="sms_proxy.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                            9Proxy Nodes
                        </a>
                    </nav>
                </div>
                <div class="p-5 border-t border-brand-border bg-gray-50/50">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold tracking-tight">9Proxy Inventory</h2>
                    <p class="text-brand-lightText text-xs md:text-sm">Manage your 9Proxy SOCKS5 Residential Nodes</p>
                </div>
                <button onclick="openAddProxyModal()" class="bg-brand-blue text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2 active:scale-95">
                    <span class="text-lg leading-none">+</span> Import 9Proxy List
                </button>
            </header>

            <div class="bg-white rounded-2xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 border-b border-brand-border">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-wider text-brand-lightText">Node Detail</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-wider text-brand-lightText">Auth</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-wider text-brand-lightText text-center">Status</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-wider text-brand-lightText">Pricing</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-wider text-brand-lightText text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="proxy-list" class="divide-y divide-brand-border"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="proxyModal" class="fixed inset-0 bg-black/50 z-[90] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-brand-border flex justify-between items-center bg-white">
                <h3 id="modalTitle" class="text-lg font-bold text-brand-blue">9Proxy Multi-Import</h3>
                <button onclick="closeModal()" class="text-brand-lightText hover:text-red-500 transition-colors p-1">✕</button>
            </div>
            
            <form id="proxyForm" class="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                <div>
                    <label class="block text-[10px] font-bold text-brand-midText mb-1.5 uppercase tracking-widest">Group / Location Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. 9Proxy US Mixed" class="w-full bg-brand-background/30 border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all">
                </div>

                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <label class="block text-[10px] font-bold text-brand-blue uppercase tracking-widest mb-2">9Proxy List (host:port:user:pass)</label>
                    <textarea id="bulkHosts" required placeholder="185.123.11.1:12345:user123:pass123&#10;185.123.11.2:12345:user123:pass123" rows="6" class="w-full bg-white border border-brand-border p-3 rounded-xl outline-none focus:border-brand-blue transition-all font-mono text-xs"></textarea>
                    <p class="text-[10px] text-brand-lightText mt-2">Paste your list directly from the 9Proxy dashboard. One per line.</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl border border-brand-border">
                    <label class="block text-[10px] font-bold text-brand-midText mb-3 uppercase tracking-widest">Pricing for this Batch</label>
                    <div id="pricingContainer" class="space-y-3"></div>
                    <button type="button" onclick="addPriceRow()" class="mt-4 text-brand-blue font-bold text-[11px] uppercase flex items-center gap-1">
                        <span class="text-base">+</span> Add Pricing Plan
                    </button>
                </div>

                <div class="pt-4 sticky bottom-0 bg-white">
                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-[0.98]">
                        Import & Sync 9Proxy Nodes
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    let allProxies = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    function addPriceRow(duration = '', price = '') {
        const container = document.getElementById('pricingContainer');
        const row = document.createElement('div');
        row.className = 'pricing-row flex gap-2 items-center';
        row.innerHTML = `
            <input type="text" placeholder="e.g. 1GB" value="${duration}" class="plan-duration flex-1 bg-white border border-brand-border p-2.5 rounded-lg text-sm">
            <div class="relative w-32">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-brand-lightText">$</span>
                <input type="number" step="0.01" value="${price}" class="plan-price w-full bg-white border border-brand-border pl-7 pr-3 py-2.5 rounded-lg text-sm">
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="p-2 text-red-400">✕</button>
        `;
        container.appendChild(row);
    }

    async function fetchProxies() {
        const token = localStorage.getItem('smsglobe_admin_token');
        const list = document.getElementById('proxy-list');
        try {
            const res = await fetch('/api/proxies', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            allProxies = data.proxies || [];
            list.innerHTML = allProxies.map(p => {
                const plans = p.plans || [];
                const planDisplay = plans.length > 0 ? `<span class="text-brand-blue font-bold">$${parseFloat(plans[0].price).toFixed(2)}</span>` : 'N/A';
                return `
                    <tr class="hover:bg-brand-background/30 transition-colors">
                        <td class="px-6 py-5">
                            <div class="font-bold text-brand-darkText">${p.name}</div>
                            <div class="text-[11px] text-brand-lightText font-mono">${p.host}:${p.port}</div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-[11px] text-brand-orange font-bold uppercase">SOCKS5</div>
                            <div class="text-[10px] text-gray-400">User: ${p.username}</div>
                        </td>
                        <td class="px-6 py-5 text-center"><span class="px-2.5 py-1 rounded-full font-bold text-[10px] bg-green-100 text-green-700 uppercase">Live</span></td>
                        <td class="px-6 py-5">${planDisplay}</td>
                        <td class="px-6 py-5 text-right">
                            <button onclick="deleteProxy('${p._id}')" class="text-red-500 font-bold text-[10px] hover:underline">DELETE</button>
                        </td>
                    </tr>`;
            }).join('');
        } catch (err) { list.innerHTML = '<tr><td colspan="5" class="p-10 text-center">Failed to load proxy inventory.</td></tr>'; }
    }

    document.getElementById('proxyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const token = localStorage.getItem('smsglobe_admin_token');
        
        btn.disabled = true;
        btn.innerText = 'Extracting 9Proxy Data...';

        const name = document.getElementById('name').value;
        const rawLines = document.getElementById('bulkHosts').value.split('\n');
        const plans = Array.from(document.querySelectorAll('.pricing-row')).map(row => ({
            duration: row.querySelector('.plan-duration').value,
            price: row.querySelector('.plan-price').value
        }));

        try {
            const requests = rawLines
                .map(line => line.trim())
                .filter(line => line.includes(':'))
                .map(line => {
                    const parts = line.split(':');
                    // 9Proxy format: host:port:user:pass
                    return fetch('/api/proxies', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({
                            name: name,
                            protocol: 'SOCKS5',
                            type: 'Residential',
                            host: parts[0],
                            port: parts[1],
                            username: parts[2] || '',
                            password: parts[3] || '',
                            plans: plans
                        })
                    });
                });

            await Promise.all(requests);
            alert(`Success: Imported ${requests.length} 9Proxy nodes.`);
            closeModal();
            fetchProxies();
        } catch (err) {
            alert('Error during import. Please check your network.');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Import & Sync 9Proxy Nodes';
        }
    });

    async function deleteProxy(id) {
        if(!confirm('Remove this node?')) return;
        const token = localStorage.getItem('smsglobe_admin_token');
        await fetch(`/api/proxies/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        fetchProxies();
    }

    function openAddProxyModal() {
        document.getElementById('proxyForm').reset();
        document.getElementById('pricingContainer').innerHTML = '';
        addPriceRow('1GB', '5.00');
        document.getElementById('proxyModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('proxyModal').classList.add('hidden'); }
    function logout() { localStorage.removeItem('smsglobe_admin_token'); window.location.href = 'sms_login.html'; }
    window.onload = fetchProxies;
</script>
</body>
</html>
