<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
</head>
<body class="bg-brand-background min-h-screen flex flex-col font-sans">

    <nav class="p-4 md:p-6">
        <div class="max-w-[1536px] mx-auto">
            <a href="/smsuser/user_dashboard" class="inline-flex items-center text-brand-blue font-bold text-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 pb-8">
        <div class="w-full max-w-[400px]">
            <div class="bg-white rounded-[24px] border border-brand-border shadow-xl p-6 md:p-10">
                
                <div class="text-center mb-6">
                    <h1 class="text-xl md:text-2xl font-extrabold text-brand-darkText mb-1.5">Security Update</h1>
                    <p class="text-brand-lightText text-xs md:text-sm">Update your account password below.</p>
                </div>

                <form id="changePassForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-brand-midText mb-1">Current Password</label>
                        <div class="relative">
                            <input type="password" id="oldPass" required
                                class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                                placeholder="••••••••">
                            <button type="button" onclick="togglePassword('oldPass', 'eyeOld')" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-lightText hover:text-brand-blue">
                                <svg id="eyeOld" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="border-t border-brand-border my-4 pt-4">
                        <div class="mb-4">
                            <label class="block text-xs font-semibold text-brand-midText mb-1">New Password</label>
                            <div class="relative">
                                <input type="password" id="newPass" required minlength="6"
                                    class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                                    placeholder="Minimum 6 characters">
                                <button type="button" onclick="togglePassword('newPass', 'eyeNew')" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-lightText hover:text-brand-blue">
                                    <svg id="eyeNew" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-brand-midText mb-1">Confirm New Password</label>
                            <div class="relative">
                                <input type="password" id="confirmPass" required
                                    class="w-full px-4 py-2.5 text-sm rounded-xl border border-brand-border focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                                    placeholder="Re-type new password">
                                <button type="button" onclick="togglePassword('confirmPass', 'eyeConfirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand-lightText hover:text-brand-blue">
                                    <svg id="eyeConfirm" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-3 md:py-4 rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            const eyeOpen = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            const eyeClosed = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L4.573 4.574m14.853 14.853L14.12 14.12M21.543 12A9.981 9.981 0 0012 5c-1.838 0-3.535.494-4.99 1.357" />';
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = eyeClosed;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = eyeOpen;
            }
        }

        document.getElementById('changePassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const oldPass = document.getElementById('oldPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const submitBtn = document.getElementById('submitBtn');
            const token = localStorage.getItem('userToken');

            if (newPass !== confirmPass) {
                alert("New passwords do not match!");
                return;
            }

            if (!token) {
                alert("Session expired. Please login again.");
                window.location.href = 'login.html';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ oldPass, newPass })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Password updated successfully!");
                    window.location.href = '/smsuser/user_dashboard';
                } else {
                    alert(data.message || "Failed to update password.");
                }
            } catch (err) {
                console.error(err);
                alert("Connection error. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Password";
            }
        });
    </script>
</body>
</html>
