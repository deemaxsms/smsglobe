<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Number | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
    @layer utilities {
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .step-hidden { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease-in-out; pointer-events: none; }
        .step-visible { opacity: 1; max-height: 2000px; overflow: visible; transition: all 0.4s ease-in-out; pointer-events: auto; }
        .service-card.active, .number-card.active { 
            border-color: #0F54C6 !important; 
            background-color: #F0F5FE !important; 
            border-width: 2px !important;
            box-shadow: 0 4px 6px -1px rgb(15 84 198 / 0.1);
        }
        .mode-btn.active {
            background-color: #0F54C6;
            color: white;
            box-shadow: 0 4px 12px rgba(15, 84, 198, 0.2);
        }
    }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button id="closeSidebar" class="lg:hidden text-gray-400 text-2xl">&times;</button>
        </div>
        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="/dashboard" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 bg-brand-background text-brand-blue rounded-lg text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span>Buy Number</span>
            </a>
        </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 md:px-8 py-3 flex items-center justify-between">
            <button id="openSidebar" class="lg:hidden p-1.5 text-brand-midText border border-brand-border rounded-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <span class="text-sm font-bold text-brand-darkText">Number Marketplace</span>
            <div class="w-8 h-8 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-xs font-bold">U</div>
        </header>

        <main class="p-4 md:p-6 max-w-5xl w-full mx-auto flex-grow pb-40">
            
            <div class="flex p-1 bg-white border border-brand-border rounded-2xl mb-8 w-full md:w-fit">
                <button onclick="setMode('activation')" id="btnActivation" class="mode-btn active flex-1 md:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all">
                    Direct Activation
                </button>
                <button onclick="setMode('rent')" id="btnRent" class="mode-btn flex-1 md:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all text-brand-lightText">
                    Rent Number
                </button>
            </div>

            <section class="space-y-4">
                <h4 class="text-xs font-bold text-brand-darkText uppercase tracking-wider">Step 1: Select Service</h4>
                <div id="serviceGrid" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-2"></div>
            </section>

            <section id="countrySection" class="step-hidden space-y-3 pt-6 border-t border-brand-border mt-8">
                <h4 class="text-[10px] font-bold text-brand-darkText uppercase">Step 2: Select Country</h4>
                <div class="relative w-full md:w-96">
                    <button onclick="toggleCountryDropdown()" class="w-full bg-white border border-brand-border rounded-xl px-4 py-3 flex items-center justify-between shadow-sm">
                        <div id="selectedCountryDisplay" class="flex items-center gap-3 text-xs text-gray-400">Select a country...</div>
                        <svg class="w-4 h-4 text-brand-lightText transition-transform" id="dropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div id="countryDropdownList" class="absolute left-0 right-0 mt-2 bg-white border border-brand-border rounded-xl shadow-2xl z-50 hidden">
                        <div class="p-2 border-b border-brand-border">
                            <input type="text" id="countrySearch" placeholder="Search country..." class="w-full text-xs p-2 rounded-lg bg-gray-50 border-none focus:ring-0" onkeyup="filterCountries()">
                        </div>
                        <div id="countryOptions" class="max-h-64 overflow-y-auto no-scrollbar"></div>
                    </div>
                </div>
            </section>

            <section id="numbersSection" class="step-hidden space-y-4 pt-6 border-t border-brand-border mt-8">
                <div class="flex items-center justify-between">
                    <h4 id="step3Title" class="text-xs font-bold text-brand-darkText uppercase">Step 3: Number Selection</h4>
                    <button onclick="fetchRealInventory()" class="text-[10px] font-bold text-brand-blue flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Refresh
                    </button>
                </div>

                <div id="rentPeriodSection" class="hidden bg-white p-4 rounded-xl border border-brand-border mb-4">
                    <label class="text-[10px] font-bold text-brand-lightText uppercase mb-2 block">Rental Duration</label>
                    <select id="rentalPeriod" onchange="calculateFinalPrice()" class="w-full bg-brand-background border-none rounded-lg p-3 text-xs font-bold text-brand-darkText focus:ring-2 focus:ring-brand-blue">
                        <option value="5h" data-multi="1">5 Hours (Standard)</option>
                        <option value="1d" data-multi="1.5">1 Day (+50%)</option>
                        <option value="3d" data-multi="2.5">3 Days</option>
                        <option value="1w" data-multi="5">1 Week</option>
                        <option value="2w" data-multi="9">2 Weeks</option>
                        <option value="1m" data-multi="15">1 Month</option>
                    </select>
                </div>

                <div id="orderSummary" class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                    <div class="bg-brand-blue/5 border border-brand-blue/10 px-3 py-2 rounded-lg flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-bold text-brand-blue uppercase">Service:</span>
                        <span id="summaryService" class="text-[10px] font-black text-brand-darkText">-</span>
                    </div>
                    <div class="bg-brand-blue/5 border border-brand-blue/10 px-3 py-2 rounded-lg flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-bold text-brand-blue uppercase">Region:</span>
                        <span id="summaryCountry" class="text-[10px] font-black text-brand-darkText">-</span>
                    </div>
                </div>

                <div id="numberGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
            </section>
        </main>

        <div class="fixed bottom-0 left-0 right-0 lg:left-64 bg-white border-t border-brand-border p-4 md:p-6 z-40 shadow-xl">
            <div class="max-w-5xl mx-auto flex items-center justify-between">
                <div>
                    <p class="text-[8px] font-bold uppercase text-brand-lightText">Total Price</p>
                    <h2 class="text-xl md:text-2xl font-black text-brand-darkText" id="displayPrice">₦0</h2>
                </div>
                <button onclick="processPurchase()" class="px-8 py-3.5 bg-brand-blue text-white rounded-xl font-bold text-xs disabled:opacity-30 transition-all active:scale-95" id="purchaseBtn" disabled>Select Service</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'activation'; // or 'rent'
        let countries = [
            { id: 'US', name: 'USA', rate: 1500, available: '...' },
            { id: 'GB', name: 'UK', rate: 1200, available: '...' },
            { id: 'NG', name: 'Nigeria', rate: 850, available: '...' },
            { id: 'RU', name: 'Russia', rate: 700, available: '...' },
            { id: 'UA', name: 'Ukraine', rate: 750, available: '...' },
            { id: 'DE', name: 'Germany', rate: 2100, available: '...' },
            { id: 'FR', name: 'France', rate: 1900, available: '...' }
        ];

        const services = [
            { id: 'wa', name: 'WhatsApp', icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png' },
            { id: 'tg', name: 'Telegram', icon: 'https://cdn-icons-png.flaticon.com/512/2111/2111646.png' },
            { id: 'go', name: 'Google', icon: 'https://cdn-icons-png.flaticon.com/512/300/300221.png' },
            { id: 'fb', name: 'Facebook', icon: 'https://cdn-icons-png.flaticon.com/512/733/733547.png' },
            { id: 'ig', name: 'Instagram', icon: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'tk', name: 'TikTok', icon: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png' },
            { id: 'tw', name: 'Twitter', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968958.png' },
            { id: 'dc', name: 'Discord', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968756.png' }
        ];

        let selectedCountry = null;
        let selectedService = null;
        let selectedNumber = null;
        let selectedTargetId = null;
        let finalPrice = 0;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-brand-lightText');
            });
            
            if (mode === 'activation') {
                document.getElementById('btnActivation').classList.add('active');
                document.getElementById('btnActivation').classList.remove('text-brand-lightText');
                document.getElementById('rentPeriodSection').classList.add('hidden');
                document.getElementById('step3Title').innerText = "Step 3: Direct Activation";
            } else {
                document.getElementById('btnRent').classList.add('active');
                document.getElementById('btnRent').classList.remove('text-brand-lightText');
                document.getElementById('rentPeriodSection').classList.remove('hidden');
                document.getElementById('step3Title').innerText = "Step 3: Rental Details";
            }
            calculateFinalPrice();
            updateButtonState();
        }

        async function fetchCountryData() {
            try {
                const response = await fetch('/api/countries/stats'); 
                const res = await response.json();
                if (res.success && res.stock) {
                    countries = countries.map(c => ({
                        ...c,
                        available: res.stock[c.id] || 0
                    }));
                }
                renderCountryOptions();
            } catch (err) { renderCountryOptions(); }
        }

        function renderServiceGrid() {
            const grid = document.getElementById('serviceGrid');
            grid.innerHTML = services.map(s => `
                <div onclick="selectService('${s.id}', '${s.name}', this)" class="service-card cursor-pointer bg-white border border-brand-border p-3 rounded-xl flex flex-col items-center justify-center transition-all hover:shadow-md">
                    <img src="${s.icon}" class="w-6 h-6 mb-2 object-contain">
                    <span class="text-[9px] font-bold text-brand-darkText text-center leading-tight">${s.name}</span>
                </div>
            `).join('');
        }

        function selectService(id, name, element) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedService = name;
            document.getElementById('summaryService').innerText = name;
            document.getElementById('countrySection').classList.replace('step-hidden', 'step-visible');
            updateButtonState();
        }

        function renderCountryOptions(filter = "") {
            const container = document.getElementById('countryOptions');
            const filtered = countries.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
            container.innerHTML = filtered.map(c => `
                <div onclick="selectCountry('${c.id}')" class="flex items-center justify-between px-4 py-3 hover:bg-brand-background cursor-pointer border-b border-gray-50 last:border-0">
                    <div class="flex items-center gap-3">
                        <img src="https://flagcdn.com/w40/${c.id.toLowerCase()}.png" class="w-5 h-auto rounded-sm border border-gray-100">
                        <div class="flex flex-col">
                             <span class="text-xs font-bold text-brand-darkText">${c.name}</span>
                             <span class="text-[9px] ${c.available > 0 ? 'text-green-600' : 'text-red-400'} font-bold uppercase">
                                ${c.available === '...' ? 'Syncing...' : `${c.available} Available`}
                             </span>
                        </div>
                    </div>
                    <span class="text-[10px] font-extrabold text-brand-blue">₦${Number(c.rate).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function toggleCountryDropdown() {
            document.getElementById('countryDropdownList').classList.toggle('hidden');
            document.getElementById('dropdownArrow').classList.toggle('rotate-180');
        }

        function filterCountries() {
            renderCountryOptions(document.getElementById('countrySearch').value);
        }

        async function selectCountry(id) {
            const country = countries.find(c => c.id === id);
            selectedCountry = country;
            document.getElementById('selectedCountryDisplay').innerHTML = `
                <img src="https://flagcdn.com/w40/${country.id.toLowerCase()}.png" class="w-4 h-auto rounded-sm">
                <span class="font-bold text-brand-darkText">${country.name}</span>
            `;
            document.getElementById('summaryCountry').innerText = country.name;
            toggleCountryDropdown();
            document.getElementById('numbersSection').classList.replace('step-hidden', 'step-visible');
            calculateFinalPrice();
            fetchRealInventory(); 
            updateButtonState();
        }

        function calculateFinalPrice() {
            if (!selectedCountry) return;
            let multiplier = 1;
            if (currentMode === 'rent') {
                const select = document.getElementById('rentalPeriod');
                multiplier = parseFloat(select.options[select.selectedIndex].getAttribute('data-multi'));
            }
            finalPrice = Math.round(selectedCountry.rate * multiplier);
            document.getElementById('displayPrice').innerText = `₦${finalPrice.toLocaleString()}`;
        }

      async function fetchRealInventory() {
    const grid = document.getElementById('numberGrid');
    grid.innerHTML = `<div class="col-span-full flex flex-col items-center py-8 space-y-2">
                        <div class="w-5 h-5 border-2 border-brand-blue border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-[10px] font-bold text-brand-lightText uppercase">Checking Textverified API...</p>
                      </div>`;
    try {
        // We now pass the service name and country code
        const response = await fetch(`/api/tellabot/numbers?country=${selectedCountry.id}&service=${selectedService}`);
        const data = await response.json();

        if (data.success) {
            // Textverified usually gives one "Ready" state or the target details
            renderNumbers(data.numbers, data.targetId); 
        } else {
            grid.innerHTML = `<p class="col-span-full text-center text-xs py-10 text-orange-500 font-bold uppercase">${data.message}</p>`;
        }
    } catch (err) { 
        grid.innerHTML = `<p class="col-span-full text-center text-xs py-10 text-red-500 font-bold uppercase">Connection Timeout</p>`; 
    }
}

     function renderNumbers(list, targetId) {
    const grid = document.getElementById('numberGrid');
    selectedTargetId = targetId; 

    grid.innerHTML = `
        <div onclick="selectNumber('READY', this)" class="number-card cursor-pointer bg-white border border-brand-border p-4 rounded-xl flex items-center justify-between group transition-all">
            <div class="flex flex-col">
                <span class="text-[8px] text-green-500 uppercase font-bold">Line Available</span>
                <span class="text-sm font-black text-brand-darkText">Secure Instant Number</span>
            </div>
            <div class="w-4 h-4 rounded-full border-2 border-brand-border group-[.active]:border-brand-blue group-[.active]:bg-brand-blue"></div>
        </div>
    `;
    
    // Auto-select it for the user since there is only one option
    const card = grid.querySelector('.number-card');
    selectNumber('READY', card);
}

function selectNumber(num, element) {
    document.querySelectorAll('.number-card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    selectedNumber = num; // Set to "READY" or a placeholder
    updateButtonState();
}

        function updateButtonState() {
            const btn = document.getElementById('purchaseBtn');
            if (!selectedService) {
                btn.innerText = "Select Service";
                btn.disabled = true;
            } else if (!selectedCountry) {
                btn.innerText = "Select Country";
                btn.disabled = true;
            } else if (!selectedNumber) {
                btn.innerText = "Select a Number";
                btn.disabled = true;
            } else {
                btn.innerText = currentMode === 'activation' ? 'Activate SMS' : 'Rent Number';
                btn.disabled = false;
            }
        }

       async function processPurchase() {
    const btn = document.getElementById('purchaseBtn');
    btn.disabled = true;
    btn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>`;
    
    const payload = {
        targetId: selectedTargetId, // Sent to Textverified
        service: selectedService,
        countryCode: selectedCountry.id,
        price: finalPrice,
        type: currentMode, // 'activation' or 'rent'
    };

    try {
        const response = await fetch('/api/rentals/activate', { // Match your router case
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const res = await response.json();
        
        if (res.success) {
            // Redirect to the status page using the NEW rentalId from Textverified
            window.location.href = `/order-status/${res.rentalId}`;
        } else { 
            alert(res.message); 
            updateButtonState(); 
        }
    } catch (err) { 
        alert("Network error."); 
        updateButtonState(); 
    }
}

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        document.getElementById('openSidebar').addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar').addEventListener('click', toggleSidebar);
        window.onload = () => { renderServiceGrid(); fetchCountryData(); };
    </script>
</body>
</html>
