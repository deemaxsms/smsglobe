<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSGlobe Admin - RDP Requests</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('smsglobe_admin_token')) {
            window.location.href = 'sms_login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6',
                            orange: '#F9861E',
                            darkText: '#101828',
                            midText: '#344054',
                            lightText: '#667085',
                            background: '#F0F5FE',
                            border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F5FE; font-size: 14px; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen font-sans text-brand-darkText">

    <div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 border-b border-brand-border sticky top-0 z-[60]">
        <img src="https://imgur.com/8YeZgfx.png" alt="Logo" class="h-6">
        <button onclick="toggleSidebar()" class="p-2 text-brand-midText hover:bg-brand-background rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[70] hidden lg:hidden backdrop-blur-sm"></div>

    <div class="flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[80] w-64 bg-white border-r border-brand-border transform -translate-x-full lg:translate-x-0 sidebar-transition lg:static lg:block min-h-screen">
            <div class="flex flex-col h-full">
                <div class="p-5 flex-1 overflow-y-auto pt-20 lg:pt-5">
                    <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-9 mb-8 hidden lg:block">
                    <nav class="space-y-1">
                        <a href="sms_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="esim_refills.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                            eSIM Management
                        </a>
                        <a href="sms_users.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            Users
                        </a>
                        <a href="rdp_request.html" class="flex items-center gap-3 px-3 py-2.5 bg-brand-background text-brand-blue rounded-xl font-bold transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            RDP Confirmation
                        </a>
                        <a href="transaction_history.html" class="flex items-center gap-3 px-3 py-2.5 text-brand-lightText hover:bg-brand-background hover:text-brand-blue rounded-xl font-medium transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                            Transaction History
                        </a>
                    </nav>
                </div>
                <div class="p-5 border-t border-brand-border bg-gray-50/50">
                    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-3 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full overflow-hidden">
            <header class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4 px-1">
                <div>
                    <h2 class="text-xl sm:text-2xl font-bold tracking-tight">RDP Provisioning</h2>
                    <p class="text-brand-lightText text-xs sm:text-sm">Manage and fulfill remote desktop requests</p>
                </div>
                <button onclick="fetchRDPRequests()" class="bg-brand-blue text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2 w-fit">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Refresh List
                </button>
            </header>

            <div class="bg-white rounded-xl border border-brand-border shadow-sm overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left text-[11px] sm:text-sm whitespace-nowrap">
                        <thead class="bg-gray-50 text-brand-lightText uppercase text-[9px] sm:text-[11px] border-b border-brand-border">
                            <tr>
                                <th class="px-4 py-4 font-bold">Transaction / ID</th>
                                <th class="px-4 py-4 font-bold">User Information</th>
                                <th class="px-4 py-4 font-bold">Server Plan / OS</th>
                                <th class="px-4 py-4 font-bold">Hardware Specs</th>
                                <th class="px-4 py-4 font-bold">Addons</th>
                                <th class="px-4 py-4 font-bold">Status</th>
                                <th class="px-4 py-4 font-bold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="rdp-body" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="7" class="px-6 py-12 text-center text-brand-lightText italic">
                                    <div class="flex flex-col items-center gap-2">
                                        <svg class="w-6 h-6 animate-spin text-brand-blue" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                        Fetching RDP requests...
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

      async function fetchRDPRequests() {
    const token = localStorage.getItem('smsglobe_admin_token');
    const tbody = document.getElementById('rdp-body');

    try {
        const response = await fetch('/api/rdp-requests', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        if (data.success && data.orders.length > 0) {
            tbody.innerHTML = data.orders.map(order => {
                const status = order.status.toLowerCase();
                
                // Extract metadata (this is where the RDP details like OS and Extra specs live)
                const meta = order.metadata || {};
                
                let actionArea = '';
                if (status === 'successful' || status === 'processing' || status === 'pending') {
                    actionArea = `
                        <div class="flex flex-col gap-2 items-end">
                            <input type="text" id="conf-${order.paymentReference}" 
                                   placeholder="IP Address / Login Details" 
                                   class="border border-brand-border rounded px-2 py-1.5 text-[10px] w-40 focus:ring-1 focus:ring-brand-blue outline-none shadow-sm font-medium">
                            <button onclick="processRDP('${order.paymentReference}')" 
                                    class="bg-brand-blue text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-blue-700 transition-all shadow-md">
                                Mark Delivered
                            </button>
                        </div>`;
                } else if (status === 'completed') {
                    actionArea = `
                        <div class="text-right">
                            <div class="text-green-600 font-bold text-[10px] flex items-center justify-end gap-1 mb-1">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                Delivered
                            </div>
                            <div class="text-[9px] text-brand-lightText font-mono truncate max-w-[120px] ml-auto" title="${order.confirmationNumber}">${order.confirmationNumber}</div>
                        </div>`;
                } else {
                    actionArea = `<span class="text-gray-400 text-[10px] italic">Failed/Cancelled</span>`;
                }

                return `
                    <tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100">
                        <td class="px-4 py-4">
                            <div class="font-bold text-brand-darkText">#${order.paymentReference.slice(-8)}</div>
                            <div class="text-[9px] font-bold text-brand-blue uppercase">RDP SERVER</div>
                        </td>

                        <td class="px-4 py-4">
                            <div class="text-[11px] font-semibold text-brand-darkText">${order.userEmail}</div>
                            <div class="text-[10px] text-brand-lightText">${order.fullName || 'No Name'}</div>
                        </td>

                        <td class="px-4 py-4">
                            <div class="font-bold text-brand-darkText uppercase text-[10px]">${order.planName || order.nodeName || 'Tier Plan'}</div>
                            <div class="text-[10px] text-brand-orange font-bold">${meta.osChoice || 'Windows Server'}</div>
                        </td>

                        <td class="px-4 py-4">
                            <div class="text-[10px] text-brand-darkText font-medium">RAM: ${meta.baseRAM || 'Standard'}</div>
                            <div class="text-[9px] text-brand-lightText font-bold">Ref: ${order.paymentReference}</div>
                        </td>

                        <td class="px-4 py-4">
                            <div class="text-[10px] text-brand-blue font-bold">+ ${meta.extraCPU || 0} Extra CPU</div>
                            <div class="text-[10px] text-brand-blue font-bold">+ ${meta.extraStorage || 0}GB Disk</div>
                        </td>

                        <td class="px-4 py-4 font-bold text-brand-darkText">
                            ₦${order.amount}
                        </td>

                        <td class="px-4 py-4">
                            <span class="px-2 py-0.5 rounded-full text-[9px] font-bold uppercase ${getStatusClass(order.status)}">
                                ${order.status}
                            </span>
                        </td>

                        <td class="px-4 py-4 text-right">
                            ${actionArea}
                        </td>
                    </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-brand-lightText italic">No RDP requests found.</td></tr>`;
        }
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-red-500 font-bold">Error loading RDP data.</td></tr>`;
    }
}
        function getStatusClass(status) {
            const s = status.toLowerCase();
            if (s === 'completed' || s === 'successful') return 'bg-green-100 text-green-700';
            if (s === 'processing' || s === 'pending') return 'bg-blue-100 text-blue-700';
            return 'bg-gray-100 text-gray-700';
        }

        async function processRDP(tid) {
            const confInput = document.getElementById(`conf-${tid}`);
            const details = confInput.value.trim();
            const btn = event.target;

            if (!details) {
                alert("Please enter the Server Login Details (IP, User, Pass).");
                confInput.focus();
                return;
            }

            if (!confirm("Confirm delivery? The user will be notified of their RDP login details.")) return;

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Saving...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const token = localStorage.getItem('smsglobe_admin_token');

            try {
                const response = await fetch('/api/rdp-request-complete', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        tid: tid, 
                        status: 'completed', 
                        confirmationNumber: details 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('RDP Provisioned successfully!');
                    await fetchRDPRequests(); 
                } else {
                    alert('Error: ' + (data.message || 'Update failed'));
                    resetButton(btn, originalText);
                }
            } catch (err) {
                alert('Connection error.');
                resetButton(btn, originalText);
            }
        }

        function resetButton(btn, text) {
            btn.disabled = false;
            btn.innerText = text;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function logout() {
            localStorage.removeItem('smsglobe_admin_token');
            window.location.href = 'sms_login.html';
        }

        window.onload = fetchRDPRequests;
    </script>
</body>
</html>
