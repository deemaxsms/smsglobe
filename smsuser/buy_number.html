<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Number | SMSGlobe</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/syKFaNI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F54C6', orange: '#F9861E', darkText: '#101828',
                            midText: '#344054', lightText: '#667085', background: '#F0F5FE', border: '#EAECF0',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
    @layer utilities {
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .step-hidden { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease-in-out; pointer-events: none; }
        .step-visible { opacity: 1; max-height: 2000px; overflow: visible; transition: all 0.4s ease-in-out; pointer-events: auto; }
        .service-card.active, .number-card.active { 
            border-color: #0F54C6 !important; 
            background-color: #F0F5FE !important; 
            border-width: 2px !important;
            box-shadow: 0 4px 6px -1px rgb(15 84 198 / 0.1);
        }
    }
    </style>
</head>
<body class="bg-brand-background min-h-screen flex font-sans text-brand-midText">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-brand-border z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <div class="p-5 border-b border-brand-border flex items-center justify-between">
            <img src="https://imgur.com/8YeZgfx.png" alt="SMSGlobe" class="h-6 w-auto">
            <button id="closeSidebar" class="lg:hidden text-gray-400 text-xl">&times;</button>
        </div>
        <nav class="flex-grow p-4 space-y-1">
            <p class="px-3 text-[10px] font-bold text-brand-lightText uppercase tracking-widest mb-2">Navigation</p>
            <a href="/dashboard" class="flex items-center space-x-3 px-3 py-2 text-brand-midText hover:bg-gray-50 rounded-lg text-xs font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 bg-brand-background text-brand-blue rounded-lg text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span>Buy Number</span>
            </a>
        </nav>
    </aside>

    <div class="flex-grow lg:ml-64 flex flex-col min-h-screen">
        <header class="bg-white border-b border-brand-border sticky top-0 z-30 px-4 md:px-8 py-3 flex items-center justify-between">
            <button id="openSidebar" class="lg:hidden p-1.5 text-brand-midText border border-brand-border rounded-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <span class="text-sm font-bold text-brand-darkText">Activation</span>
            <div class="w-8 h-8 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-xs font-bold">U</div>
        </header>

        <main class="p-4 md:p-6 max-w-5xl w-full mx-auto flex-grow pb-40">
            <section class="space-y-4">
                <h4 class="text-xs font-bold text-brand-darkText uppercase">Step 1: Select Service</h4>
                <div id="serviceGrid" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-2"></div>
            </section>

            <section id="countrySection" class="step-hidden space-y-3 pt-6 border-t border-brand-border mt-8">
                <h4 class="text-[10px] font-bold text-brand-darkText uppercase">Step 2: Select Country</h4>
                <div class="relative w-full md:w-80">
                    <button onclick="toggleCountryDropdown()" class="w-full bg-white border border-brand-border rounded-xl px-4 py-3 flex items-center justify-between shadow-sm">
                        <div id="selectedCountryDisplay" class="flex items-center gap-3 text-xs text-gray-400">Select a country...</div>
                        <svg class="w-4 h-4 text-brand-lightText transition-transform" id="dropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div id="countryDropdownList" class="absolute left-0 right-0 mt-2 bg-white border border-brand-border rounded-xl shadow-xl z-50 hidden">
                        <div id="countryOptions" class="max-h-60 overflow-y-auto no-scrollbar">
                            </div>
                    </div>
                </div>
            </section>

            <section id="numbersSection" class="step-hidden space-y-4 pt-6 border-t border-brand-border mt-8">
                <h4 class="text-xs font-bold text-brand-darkText uppercase">Step 3: Select Number</h4>
                <div id="numberGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
            </section>
        </main>

        <div class="fixed bottom-0 left-0 right-0 lg:left-64 bg-brand-blue text-white p-4 md:p-6 z-40 border-t border-white/10 shadow-2xl">
            <div class="max-w-5xl mx-auto flex items-center justify-between">
                <div>
                    <p class="text-[8px] font-bold uppercase opacity-70">Price</p>
                    <h2 class="text-xl md:text-2xl font-black" id="displayPrice">₦0</h2>
                </div>
                <button onclick="processRent()" class="px-8 py-3 bg-white text-brand-blue rounded-xl font-bold text-xs disabled:opacity-50 transition-all active:scale-95 shadow-md" id="rentBtn" disabled>Select Service</button>
            </div>
        </div>
    </div>

    <script>
        // Global State & Default List (Prevents 404 Crashes)
        let countries = [
            { id: 'US', name: 'USA', rate: 1500, available: '1,240' },
            { id: 'UK', name: 'UK', rate: 1200, available: '850' },
            { id: 'NG', name: 'Nigeria', rate: 850, available: '3,100' },
            { id: 'RU', name: 'Russia', rate: 700, available: '5,000+' },
            { id: 'UA', name: 'Ukraine', rate: 750, available: '920' },
            { id: 'DE', name: 'Germany', rate: 2100, available: '410' },
            { id: 'FR', name: 'France', rate: 1900, available: '600' }
        ];

        const services = [
            { id: 'wa', name: 'WhatsApp', icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png' },
            { id: 'tg', name: 'Telegram', icon: 'https://cdn-icons-png.flaticon.com/512/2111/2111646.png' },
            { id: 'go', name: 'Google', icon: 'https://cdn-icons-png.flaticon.com/512/300/300221.png' },
            { id: 'fb', name: 'Facebook', icon: 'https://cdn-icons-png.flaticon.com/512/733/733547.png' },
            { id: 'ig', name: 'Instagram', icon: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'tk', name: 'TikTok', icon: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png' },
            { id: 'tw', name: 'Twitter', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968958.png' },
            { id: 'dc', name: 'Discord', icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968756.png' }
        ];

        let selectedCountry = null;
        let selectedService = null;
        let selectedNumber = null;

        // Fetch Live Stats (Silently updates the default list)
        async function fetchCountryData() {
            try {
                const response = await fetch('/api/countries/stats'); 
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        countries = data; 
                        renderCountryOptions();
                    }
                }
            } catch (err) {
                console.warn("Backend /api/countries/stats not found. Using local country list.");
            }
        }

        function renderServiceGrid() {
            const grid = document.getElementById('serviceGrid');
            grid.innerHTML = services.map(s => `
                <div onclick="selectService('${s.id}', this)" class="service-card cursor-pointer bg-white border border-brand-border p-2 rounded-xl flex flex-col items-center justify-center transition-all hover:shadow-md">
                    <img src="${s.icon}" class="w-5 h-5 mb-1.5 object-contain">
                    <span class="text-[8px] font-bold text-brand-darkText truncate w-full text-center">${s.name}</span>
                </div>
            `).join('');
        }

        function selectService(id, element) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedService = id;
            document.getElementById('countrySection').classList.replace('step-hidden', 'step-visible');
            document.getElementById('rentBtn').innerText = "Select Country";
        }

        function renderCountryOptions() {
            const container = document.getElementById('countryOptions');
            container.innerHTML = countries.map(c => `
                <div onclick="selectCountry('${c.id}')" class="flex items-center justify-between px-4 py-3 hover:bg-brand-background cursor-pointer border-b border-gray-50 last:border-0">
                    <div class="flex items-center gap-3">
                        <img src="https://flagcdn.com/w40/${c.id.toLowerCase()}.png" class="w-5 h-auto rounded-sm border border-gray-100">
                        <div class="flex flex-col">
                             <span class="text-xs font-bold text-brand-darkText">${c.name}</span>
                             <span class="text-[8px] text-green-600 font-bold uppercase">${c.available} Available</span>
                        </div>
                    </div>
                    <span class="text-[10px] font-extrabold text-brand-blue">₦${Number(c.rate).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function toggleCountryDropdown() {
            document.getElementById('countryDropdownList').classList.toggle('hidden');
            document.getElementById('dropdownArrow').classList.toggle('rotate-180');
        }

        async function selectCountry(id) {
            const country = countries.find(c => c.id === id);
            selectedCountry = country;
            
            document.getElementById('selectedCountryDisplay').innerHTML = `
                <img src="https://flagcdn.com/w40/${country.id.toLowerCase()}.png" class="w-4 h-auto rounded-sm">
                <span class="font-bold text-brand-darkText">${country.name}</span>
            `;
            toggleCountryDropdown();
            
            document.getElementById('numbersSection').classList.replace('step-hidden', 'step-visible');
            document.getElementById('displayPrice').innerText = `₦${Number(country.rate).toLocaleString()}`;
            document.getElementById('rentBtn').innerText = `Buy for ₦${Number(country.rate).toLocaleString()}`;
            
            fetchRealInventory(); 
        }

        async function fetchRealInventory() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = `<p class="col-span-full text-center text-[10px] py-4 text-brand-lightText">Fetching real-time inventory...</p>`;
            
            try {
                const response = await fetch(`/api/tellabot/numbers?country=${selectedCountry.id}&service=${selectedService}`);
                const data = await response.json();

                if (data.success && data.numbers && data.numbers.length > 0) {
                    renderNumbers(data.numbers);
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center text-[10px] py-4 text-orange-500 font-bold uppercase">No stock available right now.</p>`;
                }
            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-[10px] py-4 text-red-500 uppercase font-bold">Connection Error</p>`;
            }
        }

        function renderNumbers(list) {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = list.map(num => `
                <div onclick="selectNumber('${num}', this)" class="number-card cursor-pointer bg-white border border-brand-border p-3 rounded-lg flex items-center justify-between group">
                    <span class="text-xs font-bold text-brand-darkText">${num}</span>
                    <div class="w-3 h-3 rounded-full border border-gray-300 group-[.active]:bg-brand-blue group-[.active]:border-brand-blue"></div>
                </div>
            `).join('');
        }

        function selectNumber(num, element) {
            document.querySelectorAll('.number-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedNumber = num;
            document.getElementById('rentBtn').disabled = false;
        }

        async function processRent() {
            const btn = document.getElementById('rentBtn');
            btn.disabled = true;
            btn.innerText = "Processing Transaction...";

            try {
                const response = await fetch('/api/rentals/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service: selectedService,
                        number: selectedNumber,
                        countryCode: selectedCountry.id,
                        price: selectedCountry.rate
                    })
                });

                const res = await response.json();
                if (res.success) {
                    window.location.href = `/activation-status/${res.rentalId}`;
                } else {
                    alert(res.message || "Balance too low.");
                    btn.disabled = false;
                    btn.innerText = `Buy for ₦${selectedCountry.rate.toLocaleString()}`;
                }
            } catch (err) {
                alert("Server Connection Error");
                btn.disabled = false;
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        document.getElementById('openSidebar').addEventListener('click', toggleSidebar);
        document.getElementById('closeSidebar').addEventListener('click', toggleSidebar);
        
        window.onload = () => {
            renderServiceGrid();
            renderCountryOptions(); // Render defaults first
            fetchCountryData();    // Then try to update from server
        };
    </script>
</body>
</html>
